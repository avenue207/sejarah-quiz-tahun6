<style>
:root{--nv:#1a2744;--gd:#d4a017;--gn:#1a7a4a;--gnb:#27ae60;--gnl:#eaf7ee;--rd:#c0392b;--rdb:#e74c3c;--rdl:#fdf0ef;--bdr:#dde2ef;--bg:#f0f2f5;--wh:#fff;--ink:#2c2c2c;--mt:#666}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.hdr{background:var(--nv);color:#fff;padding:1.5rem 1rem 1.2rem;text-align:center;border-bottom:4px solid var(--gd)}
.hsub{font-size:11px;color:#aab4cc;letter-spacing:.07em;margin-bottom:5px}
.hdr h1{font-family:'Noto Serif SC',serif;font-size:clamp(16px,4vw,24px);font-weight:700}
.badge{display:inline-block;background:var(--gd);color:var(--nv);font-size:11px;font-weight:700;padding:3px 11px;border-radius:99px;margin:6px 3px 0}
.pbw{background:rgba(255,255,255,.15);border-radius:99px;height:5px;margin:10px auto 0;max-width:340px}
.pb{background:var(--gd);height:5px;border-radius:99px;transition:width .4s;width:0%}
.pbl{font-size:11px;color:#aab4cc;text-align:center;margin-top:3px}
.nav{background:#111d33;padding:.55rem .75rem;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.07)}
.nav a{color:#aab4cc;font-size:11.5px;text-decoration:none;padding:4px 9px;border-radius:99px;border:1px solid rgba(255,255,255,.12);transition:all .15s;white-space:nowrap}
.nav a:hover,.nav a.active{background:var(--gd);color:var(--nv);border-color:var(--gd);font-weight:700}
.ctr{max-width:740px;margin:0 auto;padding:1.2rem 1rem 4rem}
.qc{background:var(--wh);border:1px solid var(--bdr);border-radius:11px;padding:1.2rem;margin-bottom:.9rem}
.qh{display:flex;align-items:flex-start;gap:9px;margin-bottom:.8rem}
.qn{background:var(--nv);color:#fff;font-size:11px;font-weight:700;border-radius:99px;min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qt{font-size:14px;line-height:1.65;font-weight:500;padding-top:2px}
.opts{display:flex;flex-direction:column;gap:6px}
.ob{display:flex;align-items:center;gap:9px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:7px;padding:.6rem .85rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:13.5px;text-align:left;transition:border-color .15s,background .15s;color:var(--ink)}
.ob:hover:not(:disabled){border-color:var(--nv);background:#e8ecf8}
.ol{background:var(--nv);color:#fff;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ob.correct{border-color:var(--gnb);background:var(--gnl)}.ob.correct .ol{background:var(--gn)}
.ob.wrong{border-color:var(--rdb);background:var(--rdl)}.ob.wrong .ol{background:var(--rd)}
.ob.reveal{border-color:var(--gnb);background:var(--gnl);opacity:.7}.ob.reveal .ol{background:var(--gn)}
.exp{display:none;margin-top:.8rem;background:#fff8e1;border-left:4px solid var(--gd);border-radius:0 7px 7px 0;padding:.65rem .9rem;font-size:13px;line-height:1.65;color:#5a4a1a}
.exp.show{display:block}.exp strong{color:var(--nv)}
.sub-sec{text-align:center;margin:1.75rem 0}
#subBtn{background:var(--nv);color:#fff;font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:700;padding:.8rem 2.5rem;border:none;border-radius:99px;cursor:pointer;letter-spacing:.07em;transition:background .2s}
#subBtn:hover{background:#253560}#subBtn:active{transform:scale(.97)}#subBtn:disabled{background:#aaa;cursor:not-allowed}
.warn{display:none;color:var(--rd);font-size:12.5px;margin-top:.45rem}
.rp{display:none;background:var(--wh);border:2px solid var(--nv);border-radius:14px;padding:2rem 1.5rem;text-align:center;margin:1.5rem 0}
.rp.show{display:block}
.sc{width:108px;height:108px;border-radius:50%;background:var(--nv);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto .9rem;border:4px solid var(--gd)}
.sn{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:700;line-height:1}
.sl{font-size:11px;color:#aab4cc;margin-top:2px}
.rt{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;color:var(--nv);margin-bottom:5px}
.rs{font-size:13px;color:var(--mt);margin-bottom:1.2rem;line-height:1.6}
.rstats{display:flex;justify-content:center;gap:2rem;margin-bottom:1.2rem}
.stat{text-align:center}.stn{font-size:26px;font-weight:700;font-family:'Noto Serif SC',serif}
.stn.c{color:var(--gn)}.stn.w{color:var(--rd)}.stl{font-size:11px;color:var(--mt)}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#retBtn{background:transparent;color:var(--nv);font-family:'Noto Sans SC',sans-serif;font-size:13.5px;font-weight:500;padding:.55rem 1.6rem;border:2px solid var(--nv);border-radius:99px;cursor:pointer;transition:background .2s}
#retBtn:hover{background:#e8ecf8}
.btn-next{display:inline-block;background:var(--gd);color:var(--nv);font-family:'Noto Sans SC',sans-serif;font-size:13.5px;font-weight:700;padding:.55rem 1.6rem;border-radius:99px;text-decoration:none;letter-spacing:.04em}
</style></head><body>

<script>
const Q=[{"q": "1951年就合并事宜与各地领袖会谈的英国驻东南亚高级总督是谁？", "opts": ["葛波勋爵", "布拉西勋爵", "马尔科姆麦克唐纳", "安东尼阿贝"], "ans": 2, "exp": "1951年，英国驻东南亚高级总督马尔科姆麦克唐纳（Malcolm MacDonald）就合并一事与马来亚、砂拉越、沙巴和新加坡的领袖进行了多次会谈。"}, {"q": "国家原则的第一项原则是什么？", "opts": ["忠于君国", "维护宪法", "信奉上苍", "培养德行"], "ans": 2, "exp": "国家原则第一项是信奉上苍（Kepercayaan kepada Tuhan），强调宗教信仰的重要性。"}, {"q": "马蒂雅娜扶老婆婆过马路，体现了哪项国家原则？", "opts": ["信奉上苍", "忠于君国", "维护宪法", "培养德行"], "ans": 3, "exp": "课文举例：马蒂雅娜主动扶老婆婆过马路，体现了培养德行的精神。"}, {"q": "马来西亚东马两州（沙巴、砂拉越）于哪一年加入马来西亚联邦？", "opts": ["1957年", "1960年", "1963年", "1965年"], "ans": 2, "exp": "沙巴和砂拉越于1963年9月16日与马来亚联合邦和新加坡共同组成马来西亚联邦。"}, {"q": "以米南加保文化著称，有独特双尖牛角屋顶建筑的州是哪个？", "opts": ["霹雳", "吉打", "森美兰", "彭亨"], "ans": 2, "exp": "森美兰州（Negeri Sembilan）受米南加保文化影响，以独特的双尖牛角屋顶传统建筑著称。"}, {"q": "颁布国家原则的是马来西亚第几任最高元首？", "opts": ["第一任", "第二任", "第三任", "第四任"], "ans": 3, "exp": "国家原则由第四任国家元首苏丹依斯迈纳西鲁丁沙颁布。"}, {"q": "仄迪族（Chetti）是哪两个群体通婚的后代？", "opts": ["英国人与本地人", "来自中国的商人与马六甲当地女性", "来自印度的商人与本地女子", "葡萄牙人与马来人"], "ans": 2, "exp": "课文指出，仄迪族（Chetti）或土生印度人是来自印度的商人与本地女子通婚后所生的后代。"}, {"q": "葛波委员会成立于哪一天？", "opts": ["1961年7月23日", "1962年1月17日", "1962年6月21日", "1963年7月9日"], "ans": 1, "exp": "葛波委员会（Suruhanjaya Cobbold）于1962年1月17日成立，目的是收集砂拉越与沙巴的民意。"}, {"q": "暹罗族分布在马来半岛的哪些州属？", "opts": ["霹雳、雪兰莪、柔佛、彭亨", "吉打、吉兰丹、玻璃市、槟城和霹雳", "沙巴、砂拉越、马六甲", "雪兰莪、吉隆坡、森美兰"], "ans": 1, "exp": "课文指出，暹罗族分布在吉打、吉兰丹、玻璃市、槟城和霹雳。"}, {"q": "课文总结成立马来西亚的历史教诲是什么？", "opts": ["军事力量最重要", "经济发展优先", "各方的真诚、同理心和协商精神带来繁荣与昌盛", "只有单一族群才能建国"], "ans": 2, "exp": "课文总结：各方的真诚、同理心和协商精神，为我国带来繁荣与昌盛。"}, {"q": "峇峇娘惹使用什么语言沟通？", "opts": ["闽南语", "客家语", "峇峇语", "克里奥尔马来语"], "ans": 2, "exp": "课文指出，峇峇娘惹以峇峇语沟通，他们的生活方式、语言、风俗习惯和饮食文化与本地文化融合而成。"}, {"q": "华族女性的传统服装是什么？", "opts": ["马来套装", "纱丽", "旗袍", "绣花哥峇雅"], "ans": 2, "exp": "课文指出，华族女性的传统服装是旗袍，男性的是长衫，这些服装多数以柔软的丝绸制成。"}, {"q": "纳闽（Labuan）联邦直辖区位于哪里附近？", "opts": ["马来半岛西海岸", "砂拉越沿海", "沙巴西海岸外", "柔佛海峡"], "ans": 2, "exp": "纳闽是位于沙巴西海岸外的小岛，1984年成为联邦直辖区，是马来西亚国际离岸金融中心。"}, {"q": "以下哪个描述正确说明马来西亚的州属组成？", "opts": ["全部州在马来半岛", "13个州中11个在半岛，2个在婆罗洲", "只有5个州", "全部州在婆罗洲"], "ans": 1, "exp": "马来西亚13个州中，11个（西马）在马来半岛，2个（东马：沙巴和砂拉越）在婆罗洲岛北部。"}, {"q": "以下哪个州的首府是哥打巴鲁（Kota Bharu）？", "opts": ["丁加奴", "彭亨", "吉兰丹", "霹雳"], "ans": 2, "exp": "吉兰丹州（Kelantan）的首府是哥打巴鲁（Kota Bharu），以保存马来传统文化著称。"}, {"q": "马来西亚哪个州以石油和天然气产业著称，首府是瓜拉丁加奴？", "opts": ["吉兰丹", "彭亨", "丁加奴", "霹雳"], "ans": 2, "exp": "丁加奴州（Terengganu）首府是瓜拉丁加奴（Kuala Terengganu），是马来西亚重要的石油和天然气产区。"}, {"q": "国家原则的第五项原则是什么？", "opts": ["信奉上苍", "忠于君国", "维护宪法", "培养德行"], "ans": 3, "exp": "国家原则第五项是培养德行（Kesopanan dan Kesusilaan），强调培养良好的道德观和行为举止。"}, {"q": "国家原则能塑造有高尚情操的社会，诚信的人能避免什么行为？", "opts": ["迟到早退", "在考试中作弊", "不做运动", "不读书"], "ans": 1, "exp": "课文举例，一个有诚信的人能避免在生活中犯错，比如在考试中作弊。"}, {"q": "联合国马来西亚任务调查团（UNMM）的目的是什么？", "opts": ["调查共产党", "核实砂拉越与沙巴人民参组马来西亚的意向", "主持签署仪式", "提供军事援助"], "ans": 1, "exp": "联合国成立UNMM，以核实砂拉越与沙巴人民参组马来西亚的意向。"}, {"q": "砂拉越的族群不包括以下哪个？", "opts": ["比达友族", "肯雅族", "龙古斯族", "马兰诺族"], "ans": 2, "exp": "龙古斯族是沙巴的族群，不属于砂拉越。砂拉越族群包括马来族、比达友族、肯雅族、加拉毕族、马兰诺族等。"}, {"q": "1938年依布拉欣耶谷和哈仑阿米努拉昔提出的合并概念称为什么？", "opts": ["马来西亚", "印度尼西亚", "大马来由（Melayu Raya）", "东南亚联邦"], "ans": 2, "exp": "1938年，他们提出大马来由（Melayu Raya）概念，主张把马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛合并。"}, {"q": "华族传统服装主要以什么材料制成？", "opts": ["棉布", "丝绸", "亚麻", "蜡染布"], "ans": 1, "exp": "课文指出，华族的旗袍和长衫多数以柔软的丝绸制成。"}, {"q": "伊班族女性在嘉华节穿什么传统服装？", "opts": ["纱丽", "马来套装", "纺织图案的彩布（pua kumbu）", "旗袍"], "ans": 2, "exp": "课文指出，在嘉华节或婚宴时，伊班族女性会穿上纺织图案的彩布（pua kumbu）。"}, {"q": "课文指出，正直的操守会影响我们哪些方面的表现？", "opts": ["只影响政治", "在教育、事业和生活中的表现", "只影响经济", "只影响宗教"], "ans": 1, "exp": "课文指出，正直的操守会影响我们在教育、事业和生活中的表现。"}, {"q": "成立马来西亚最初的概念包括但最终没有加入的地方是？", "opts": ["砂拉越", "沙巴", "新加坡", "汶莱"], "ans": 3, "exp": "成立马来西亚的最初概念包括汶莱，但汶莱最终没有加入，马来西亚由马来亚联合邦、砂拉越、沙巴与新加坡组成。"}, {"q": "马来西亚首都吉隆坡属于什么类型的行政区划？", "opts": ["普通州", "联邦直辖区", "自治区", "特别行政区"], "ans": 1, "exp": "吉隆坡是马来西亚联邦直辖区，直属联邦政府管辖，是马来西亚首都和最大城市。"}, {"q": "我们应如何对待提出成立马来西亚概念的领袖？", "opts": ["批评其错误", "忘记他们", "珍惜他们的贡献与智慧", "只纪念独立领袖"], "ans": 2, "exp": "课文指出：对于提出成立马来西亚概念的领袖，我们应该珍惜他们的贡献与智慧。"}, {"q": "马来西亚的三个联邦直辖区不包括哪个？", "opts": ["吉隆坡", "布城", "纳闽", "莎阿南"], "ans": 3, "exp": "马来西亚的三个联邦直辖区是吉隆坡、布城（Putrajaya）和纳闽（Labuan），莎阿南是雪兰莪州首府。"}, {"q": "在社会层面，实践国家原则有什么效果？", "opts": ["个人财富增加", "包容与相互谅解，为社会带来和谐与安宁", "军事力量增强", "出口增加"], "ans": 1, "exp": "课文指出，社会层面：包容与相互谅解，为社会带来和谐与安宁。"}, {"q": "东姑阿都拉曼在宣布马来西亚成立的大典上高呼了几声默迪卡？", "opts": ["三声", "五声", "七声", "九声"], "ans": 2, "exp": "课文图片说明：东姑阿都拉曼在宣布马来西亚成立的大典上高呼七声默迪卡。"}, {"q": "华族多以哪些语言沟通？", "opts": ["淡米尔语和马来语", "华语或方言如闽南语、客家语、粤语等", "伊班语和马来语", "旁遮普语和英语"], "ans": 1, "exp": "课文指出，华族多以华语或者方言如闽南语、客家语、粤语等沟通。"}, {"q": "国家原则的宗旨是什么？", "opts": ["增加国防开支", "培养团结且具包容态度的国民", "促进对外贸易", "提高国民生产总值"], "ans": 1, "exp": "课文指出，国家原则旨在培养团结且具包容态度的国民，是促进忠诚与爱国精神的指南。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';
  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    d.innerHTML=`<div class="qh"><div class="qn">${i+1}</div><div class="qt">${q.q}</div></div>
    <div class="opts">${q.opts.map((o,j)=>`<button class="ob" id="o${i}_${j}" onclick="pick(${i},${j})"><span class="ol">${L[j]}</span><span>${o}</span></button>`).join('')}</div>
    <div class="exp" id="ex${i}"><strong>✓ 解析：</strong>${q.exp}</div>`;
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++){const b=document.getElementById('o'+qi+'_'+j);b.style.cssText='';}
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSubmit(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=ua===ra;if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！再接再厉！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题的解析，下次一定更好！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，你会进步更快的！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂每道题的解析，再来一次，必定进步！';}
  document.getElementById('rt').textContent=t;
  document.getElementById('rs').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script></body></html>

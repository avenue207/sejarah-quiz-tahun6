<script>
const Q=[{"q": "槟城乔治市（George Town）的历史重要性是什么？", "opts": ["是马来西亚首都", "是英国在马来亚建立的第一个殖民地", "是马来西亚面积最大的州", "是马来西亚第一个宣告独立的州"], "ans": 1, "exp": "槟城（Penang）是英国在马来亚建立的第一个殖民地，弗朗西斯莱特于1786年占领槟城。"}, {"q": "UNMM代表什么？", "opts": ["马来西亚忠诚委员会", "葛波委员会", "联合国马来西亚任务调查团", "跨政府委员会"], "ans": 2, "exp": "UNMM是United Nations Malaysia Mission的缩写，即联合国马来西亚任务调查团，核实砂拉越与沙巴人民参组马来西亚的意向。"}, {"q": "马来西亚社会由哪些主要族群组成？（课文所列）", "opts": ["只有马来族和华族", "马来族、华族、印度族、半岛原住民、伊班族等多元族群", "只有三大民族", "只有马来族、华族、印度族"], "ans": 1, "exp": "课文指出，马来西亚各族群包括马来族、华族、印度族、半岛原住民、伊班族、马兰诺族、卡达山杜顺族、比达友族、巴瑶族和伊拉农族等。"}, {"q": "独立前华族主要居住在哪里，从事什么经济活动？", "opts": ["乡村，捕鱼", "市镇与城市，采矿与经商", "园丘，种植橡胶", "内陆，狩猎"], "ans": 1, "exp": "课文指出，独立前，华族住在市镇与城市，从事采矿与经商。"}, {"q": "以下哪个是马来西亚的联邦行政首都？", "opts": ["吉隆坡", "布城（Putrajaya）", "莎阿南", "纳闽"], "ans": 1, "exp": "布城（Putrajaya）是马来西亚联邦政府的行政中心，1999年起政府机构陆续迁入。"}, {"q": "以下哪项情境体现了尊崇法治？", "opts": ["在考试中作弊", "骑自行车遵守交通规则", "随意停车", "不尊重师长"], "ans": 1, "exp": "课文举例（安沙）：骑自行车上学时遵守交通规则，体现了尊崇法治的精神。"}, {"q": "马来西亚的成立是指以下哪几个地方合并组成联邦国家？", "opts": ["马来亚联合邦、砂拉越、沙巴与新加坡", "马来亚联合邦、砂拉越与沙巴", "马来亚联合邦与新加坡", "马来亚联合邦、砂拉越、沙巴、新加坡与汶莱"], "ans": 0, "exp": "课文明确指出，马来西亚的成立是指马来亚联合邦、砂拉越、沙巴与新加坡组成一个联邦国家的历史事件。"}, {"q": "制定国家原则的三大原因中，以下哪项是经济因素？", "opts": ["居住地区的分化", "政治理念的不同", "经济地位的落差", "外国侵略威胁"], "ans": 2, "exp": "课文列出制定国家原则的三个原因：经济地位的落差（经济因素）、居住地区的分化（社会因素）、政治理念的不同（政治因素）。"}, {"q": "马来西亚首都吉隆坡属于什么类型的行政区划？", "opts": ["普通州", "联邦直辖区", "自治区", "特别行政区"], "ans": 1, "exp": "吉隆坡是马来西亚联邦直辖区，直属联邦政府管辖，是马来西亚首都和最大城市。"}, {"q": "以下哪个联邦直辖区是最晚成立的？", "opts": ["吉隆坡（1974年）", "纳闽（1984年）", "布城（Putrajaya，2001年）", "三者同时成立"], "ans": 2, "exp": "布城于2001年成为马来西亚第三个联邦直辖区，是最晚成立的；吉隆坡1974年，纳闽1984年。"}, {"q": "国家原则共有多少项功能？", "opts": ["三项", "四项", "五项", "六项"], "ans": 3, "exp": "课文列出国家原则的六项功能：塑造有宗教信仰的社会、塑造富有爱国精神的社会、培养尊重法治的态度、巩固社会团结、贯彻道德价值观、塑造有高尚情操的社会。"}, {"q": "以下哪个州首府是怡保（Ipoh），历史上以锡矿著称？", "opts": ["彭亨", "雪兰莪", "霹雳", "丁加奴"], "ans": 2, "exp": "霹雳州（Perak）首府怡保（Ipoh），历史上是马来西亚最重要的锡矿产区，怡保曾有锡都之称。"}, {"q": "《马来西亚协定》在哪栋建筑物签署？", "opts": ["白金汉宫", "唐宁街10号", "马尔伯勒大楼", "国会大厦"], "ans": 2, "exp": "课文指出，《马来西亚协定》在英国伦敦的马尔伯勒大楼（Marlborough House）签署。"}, {"q": "在国家层面，实践国家原则有什么效果？", "opts": ["增加外汇储备", "社会和谐与安宁，能巩固国家的稳定和发展", "增加军备", "扩大领土"], "ans": 1, "exp": "课文指出，在国家层面：社会和谐与安宁，能巩固国家的稳定和发展。"}, {"q": "仄迪族多数居住在哪里？", "opts": ["槟城", "吉隆坡", "马六甲", "新山"], "ans": 2, "exp": "课文指出，仄迪族多数居住在马六甲，沟通语是克里奥尔马来语（Melayu kreol）。"}, {"q": "国家原则共有多少项原则？", "opts": ["三项", "四项", "五项", "六项"], "ans": 2, "exp": "国家原则共有五项原则：信奉上苍、忠于君国、维护宪法、尊崇法治、培养德行。"}, {"q": "独立后各族居住模式发生了什么变化？", "opts": ["各族仍然分群居住", "各族群因经济活动而分群居住的问题已获解决，族群间包容精神促使他们一起工作", "各族间冲突加剧", "政府强制各族搬迁"], "ans": 1, "exp": "课文指出，独立与成立马来西亚后，各族群分群居住问题已获解决，族群间包容精神促使他们一起工作，同住一个地区。"}, {"q": "马来西亚国家行政中心布城（Putrajaya）隶属于哪个联邦直辖区？", "opts": ["吉隆坡", "雪兰莪", "布城（Putrajaya）本身就是联邦直辖区", "森美兰"], "ans": 2, "exp": "布城（Putrajaya）本身就是马来西亚三个联邦直辖区之一，于2001年独立成为联邦直辖区。"}, {"q": "色拉尼族使用哪两种语言？", "opts": ["马来语和淡米尔语", "克里斯坦语（Kristang）和英语", "旁遮普语和马来语", "峇峇语和华语"], "ans": 1, "exp": "课文指出，色拉尼族使用克里斯坦语（Kristang）和英语。"}, {"q": "砂拉越的首府是哪个城市？", "opts": ["亚庇", "诗巫", "古晋（Kuching）", "美里"], "ans": 2, "exp": "古晋（Kuching）是砂拉越州的首府，以猫城之称著名。"}, {"q": "马来西亚成立时汶莱没有加入，最终马来西亚由几个地方组成？", "opts": ["三个", "四个", "五个", "六个"], "ans": 1, "exp": "马来西亚最终由马来亚联合邦、砂拉越、沙巴与新加坡四个地方组成（汶莱没有加入）。"}, {"q": "国家原则（Rukun Negara）颁布于哪一年哪一天？", "opts": ["1957年8月31日", "1963年9月16日", "1969年5月13日", "1970年8月31日"], "ans": 3, "exp": "国家原则于1970年8月31日，在马来西亚庆祝独立13周年纪念日时正式颁布。"}, {"q": "第四任国家元首的全名是什么？", "opts": ["端姑阿都哈林", "端姑希沙慕丁", "苏丹依斯迈纳西鲁丁沙", "苏丹阿都拉"], "ans": 2, "exp": "颁布国家原则的第四任国家元首是苏丹依斯迈纳西鲁丁沙（Tuanku Sultan Ismail Nasiruddin Shah Ibni Almarhum Sultan Zainal Abidin）。"}, {"q": "马来西亚忠诚委员会的马来文缩写是什么？", "opts": ["JAK", "JSKM", "UNMM", "MAPEN"], "ans": 1, "exp": "马来西亚忠诚委员会的马来文全称是Jawatankuasa Setia Kawan Malaysia，缩写为JSKM。"}, {"q": "马来族男性的传统服装叫什么？", "opts": ["旗袍", "纱丽", "马来男装（baju Melayu）", "陀地（doti）"], "ans": 2, "exp": "课文指出，马来族的传统服装以女性马来套装（baju kurung）和男性马来男装（baju Melayu）为大家所熟悉。"}, {"q": "砂拉越沿海的马来族、马兰诺族和卡达央族独立前从事什么活动？", "opts": ["种植稻米", "采集森林资源", "经商、造船和生产硕莪", "捕鱼和农耕"], "ans": 2, "exp": "课文指出，住在沿海的马来族、马兰诺族和卡达央族，从事经商、造船和生产硕莪的工作。"}, {"q": "以下哪个州以米南加保（Minangkabau）双尖牛角屋顶传统建筑著称？", "opts": ["霹雳", "吉打", "森美兰（Negeri Sembilan）", "彭亨"], "ans": 2, "exp": "森美兰州受米南加保文化影响，以独特的双尖牛角屋顶（Rumah Minangkabau）传统建筑著称，在马来西亚独一无二。"}, {"q": "课文中成立马来西亚的概念是由哪两方提出的？", "opts": ["马来族和华族", "本地领袖和英国殖民当局", "东南亚各国和联合国", "马来亚和印度尼西亚"], "ans": 1, "exp": "课文明确指出，成立马来西亚的最初概念是由本地领袖和英国殖民当局所提出的。"}, {"q": "国家咨询理事会的马来文缩写是？", "opts": ["JAK", "JSKM", "MAPEN", "UNMM"], "ans": 2, "exp": "国家咨询理事会的马来文名称是Majlis Perundingan Negara，缩写为MAPEN。"}, {"q": "锡克族男性传统服装有什么特征？", "opts": ["穿旗袍", "穿纱丽", "穿长至膝盖的上衣和裤子及缠头巾", "穿绣花哥峇雅"], "ans": 2, "exp": "课文指出，锡克族男性的服装是长至膝盖的上衣和裤子（tahmat/tamba）及缠头巾，头巾是锡克文化的重要象征。"}, {"q": "新加坡公投的结果是什么？", "opts": ["人民反对成立马来西亚", "结果各半", "人民支持成立马来西亚", "公投被取消"], "ans": 2, "exp": "新加坡举行的公投结果显示，新加坡人民支持成立马来西亚。"}, {"q": "葛波委员会报告于哪一天移交？", "opts": ["1962年1月17日", "1962年6月21日", "1963年7月9日", "1963年8月12日"], "ans": 1, "exp": "葛波委员会于1962年6月21日将民意调查报告移交予英国殖民当局与马来亚联合邦。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';
  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

<script>
const Q=[{"q": "国家原则能塑造富有爱国精神的社会，爱国国民会尊重哪些国家象征？", "opts": ["政党旗帜", "城市标志", "国旗、国徽和国歌", "首相官邸"], "ans": 2, "exp": "课文指出，富有爱国精神的国民会效忠国家，愿意为国家牺牲，也会尊重国家主权的象征如国旗、国徽和国歌。"}, {"q": "课文中成立马来西亚的概念是由哪两方提出的？", "opts": ["马来族和华族", "本地领袖和英国殖民当局", "东南亚各国和联合国", "马来亚和印度尼西亚"], "ans": 1, "exp": "课文明确指出，成立马来西亚的最初概念是由本地领袖和英国殖民当局所提出的。"}, {"q": "《马来西亚协定》签署的日期是？", "opts": ["1962年6月21日", "1963年7月9日", "1963年8月12日", "1963年9月16日"], "ans": 1, "exp": "《马来西亚协定》于1963年7月9日在英国伦敦的马尔伯勒大楼（Marlborough House）签署。"}, {"q": "在国家层面，实践国家原则有什么效果？", "opts": ["增加外汇储备", "社会和谐与安宁，能巩固国家的稳定和发展", "增加军备", "扩大领土"], "ans": 1, "exp": "课文指出，在国家层面：社会和谐与安宁，能巩固国家的稳定和发展。"}, {"q": "哈仑阿米努拉昔与依布拉欣耶谷在哪一年提出大马来由概念？", "opts": ["1887年", "1938年", "1951年", "1955年"], "ans": 1, "exp": "1938年，本地领袖依布拉欣耶谷（Ibrahim Haji Yaakob）和哈仑阿米努拉昔（Harun Aminurrashid）提出大马来由（Melayu Raya）的概念。"}, {"q": "丹斯里拿督阿玛史蒂芬卡隆宁甘所属政党是？", "opts": ["沙统（USNO）", "砂拉越保守党（PESAKA）", "砂拉越国民党（SNAP）", "人民行动党"], "ans": 2, "exp": "丹斯里拿督阿玛史蒂芬卡隆宁甘（Tan Sri Datuk Amar Stephen Kalong Ningkan）是砂拉越国民党（SNAP）领袖，在成立砂拉越联盟方面有重要贡献。"}, {"q": "马来半岛最南端的州是哪个？", "opts": ["马六甲", "森美兰", "柔佛", "雪兰莪"], "ans": 2, "exp": "柔佛州（Johor）位于马来半岛最南端，与新加坡之间以柔佛海峡相隔。"}, {"q": "以下哪个州的首府是哥打巴鲁（Kota Bharu），以传统马来文化著称？", "opts": ["丁加奴", "彭亨", "吉兰丹（Kelantan）", "霹雳"], "ans": 2, "exp": "吉兰丹州首府哥打巴鲁（Kota Bharu），以保存马来传统文化著称，包括皮影戏、风筝等。"}, {"q": "独立前华族主要居住在哪里，从事什么经济活动？", "opts": ["乡村，捕鱼", "市镇与城市，采矿与经商", "园丘，种植橡胶", "内陆，狩猎"], "ans": 1, "exp": "课文指出，独立前，华族住在市镇与城市，从事采矿与经商。"}, {"q": "以下哪个州首府是入保怡保（Ipoh），是马来西亚第三大城市？", "opts": ["彭亨", "雪兰莪", "霹雳（Perak）", "丁加奴"], "ans": 2, "exp": "怡保（Ipoh）是霹雳州首府，是马来西亚第三大城市，以白咖啡和石灰岩地貌著名。"}, {"q": "以下哪项情境体现了忠于君国？", "opts": ["遵守交通规则", "扶老婆婆过马路", "参与国会立法", "参加国防部突击队训练，有志捍卫国家主权"], "ans": 3, "exp": "课文举例（沙吉星）：参与国防部突击队训练，有志于贡献国家、捍卫独立性和主权，体现了忠于君国。"}, {"q": "以下哪个是马来西亚的联邦直辖区？", "opts": ["雪兰莪", "霹雳", "纳闽（Labuan）", "柔佛"], "ans": 2, "exp": "马来西亚的三个联邦直辖区是吉隆坡、布城（Putrajaya）和纳闽（Labuan）。"}, {"q": "国家原则第三项（维护宪法）的马来文是？", "opts": ["Kedaulatan Undang-Undang", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 2, "exp": "国家原则第三项维护宪法的马来文是Keluhuran Perlembagaan。"}, {"q": "以下哪个州是马来西亚人口最多、工业最发达的州？", "opts": ["柔佛", "霹雳", "雪兰莪（Selangor）", "彭亨"], "ans": 2, "exp": "雪兰莪州（Selangor）是马来西亚人口最多、工业最发达的州，吉隆坡联邦直辖区由其分出。"}, {"q": "国家原则第五项（培养德行）的马来文是？", "opts": ["Kepercayaan kepada Tuhan", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 3, "exp": "国家原则第五项培养德行的马来文是Kesopanan dan Kesusilaan。"}, {"q": "砂拉越的首府是哪个城市？", "opts": ["亚庇", "诗巫", "古晋（Kuching）", "美里"], "ans": 2, "exp": "古晋（Kuching）是砂拉越州的首府，以猫城之称著名。"}, {"q": "独立前马来族主要居住在哪里，从事什么经济活动？", "opts": ["市镇，采矿", "园丘，橡胶种植", "乡村、沿海地带与河畔，农耕、捕鱼、小生意与公共服务", "内陆，狩猎"], "ans": 2, "exp": "课文指出，独立前，马来族住在乡村、沿海地带与河畔，从事农耕、捕鱼、小生意与公共服务。"}, {"q": "制定国家原则的直接历史背景是什么？", "opts": ["马来西亚加入联合国", "1963年马来西亚成立", "1969年5月13日事件", "日本占领马来亚"], "ans": 2, "exp": "课文指出，1969年5月13日事件之后，国家行动理事会负责管制马来西亚，国家原则就是在那时制定的。"}, {"q": "课文指出，我们应该如何看待成立马来西亚的各方领袖？", "opts": ["批评其决策错误", "遗忘他们的贡献", "珍惜他们的贡献与智慧", "只纪念东姑阿都拉曼"], "ans": 2, "exp": "课文明确指出：对于这些领袖，我们应该珍惜他们的贡献与智慧。"}, {"q": "布拉西勋爵于哪一年提出合并建议？", "opts": ["1838年", "1887年", "1938年", "1951年"], "ans": 1, "exp": "1887年，英国北婆罗洲公司董事布拉西勋爵（Lord Brassey）建议把砂拉越、沙巴、马来半岛和海峡殖民地合并起来。"}, {"q": "各族群的文化特色需要大家如何对待？", "opts": ["可以忘记", "改变其文化", "珍惜各族群的文化特色才能发扬光大", "只保留马来族文化"], "ans": 2, "exp": "课文指出，各族群的文化特色需要大家的珍惜，才能发扬光大。"}, {"q": "以下哪个州被称为马来西亚米仓，是最重要的稻米产区？", "opts": ["霹雳", "彭亨", "吉打（Kedah）", "柔佛"], "ans": 2, "exp": "吉打州（Kedah）被称为马来西亚的米仓，是全国最重要的稻米产区，以优质大米著名。"}, {"q": "马来西亚的成立是指以下哪几个地方合并组成联邦国家？", "opts": ["马来亚联合邦、砂拉越、沙巴与新加坡", "马来亚联合邦、砂拉越与沙巴", "马来亚联合邦与新加坡", "马来亚联合邦、砂拉越、沙巴、新加坡与汶莱"], "ans": 0, "exp": "课文明确指出，马来西亚的成立是指马来亚联合邦、砂拉越、沙巴与新加坡组成一个联邦国家的历史事件。"}, {"q": "独立前印度族主要居住在哪里，从事什么经济活动？", "opts": ["市镇，经商", "园丘与市郊，园丘工作、小生意与码头工人", "内陆，农耕", "沿海，捕鱼"], "ans": 1, "exp": "课文指出，独立前，印度族住在园丘与市郊，从事园丘、小生意与码头工人的工作。"}, {"q": "以下哪个描述正确说明马来西亚州属的组成？", "opts": ["全部州在马来半岛", "13个州中11个在半岛，2个在婆罗洲", "全部州在婆罗洲", "只有5个州"], "ans": 1, "exp": "马来西亚13个州中，11个（西马）在马来半岛，2个（东马：沙巴和砂拉越）在婆罗洲岛北部。"}, {"q": "峇峇和娘惹是哪两个群体通婚的后代？", "opts": ["英国人与马来人", "来自中国的商人与马六甲当地女性", "印度商人与华族女性", "葡萄牙人与马来人"], "ans": 1, "exp": "课文指出，峇峇和娘惹是早期来自中国的商人和马六甲当地女性通婚的后代，男性称峇峇（Baba），女性称娘惹（Nyonya）。"}, {"q": "独立前马来半岛原住民主要居住在哪里，从事什么经济活动？", "opts": ["市镇，经商", "园丘，种植橡胶", "内陆地区（霹雳、雪兰莪、彭亨、吉兰丹和登嘉楼），手工艺、狩猎与采集森林资源", "沿海，捕鱼"], "ans": 2, "exp": "课文指出，独立前，马来半岛原住民住在内陆地区，从事手工艺、狩猎与采集森林资源的工作。"}, {"q": "印度族多以哪种语言沟通？", "opts": ["华语", "马来语", "淡米尔语", "英语"], "ans": 2, "exp": "课文指出，印度族多以淡米尔语沟通，有些也以泰卢固语（Telugu）、马拉雅拉姆语（Malayalam）沟通。"}, {"q": "原住民手工艺博物馆位于吉隆坡的哪条路？", "opts": ["安邦路", "白沙罗路（Jalan Damansara）", "打钵路", "双溪毛糯路"], "ans": 1, "exp": "课文指出，原住民手工艺博物馆位于吉隆坡的白沙罗路（Jalan Damansara），协助维护和发扬原住民的文化艺术遗产。"}, {"q": "通过国家原则，国人能谅解和尊重不同族群的宗教和文化，这体现了哪项功能？", "opts": ["培养尊重法治的态度", "巩固社会团结", "塑造有宗教信仰的社会", "贯彻道德价值观"], "ans": 1, "exp": "课文指出，通过国家原则，国人能谅解和尊重不同族群的宗教和文化，从而巩固社会团结。"}, {"q": "国家原则共有多少项原则？", "opts": ["三项", "四项", "五项", "六项"], "ans": 2, "exp": "国家原则共有五项原则：信奉上苍、忠于君国、维护宪法、尊崇法治、培养德行。"}, {"q": "成立马来西亚的最初概念包括五个地方，哪个最终没有加入？", "opts": ["砂拉越", "沙巴", "新加坡", "汶莱"], "ans": 3, "exp": "成立马来西亚的最初概念包括马来亚联合邦、砂拉越、沙巴、新加坡与汶莱五个地方，但汶莱最终没有加入。"}];

    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

<script>
const Q=[{"q": "在社会层面，实践国家原则有什么效果？", "opts": ["个人财富增加", "包容与相互谅解，为社会带来和谐与安宁", "军事力量增强", "出口增加"], "ans": 1, "exp": "课文指出，社会层面：包容与相互谅解，为社会带来和谐与安宁。"}, {"q": "峇峇和娘惹是哪两个群体通婚的后代？", "opts": ["英国人与马来人", "来自中国的商人与马六甲当地女性", "印度商人与华族女性", "葡萄牙人与马来人"], "ans": 1, "exp": "课文指出，峇峇和娘惹是早期来自中国的商人和马六甲当地女性通婚的后代，男性称峇峇（Baba），女性称娘惹（Nyonya）。"}, {"q": "以下哪个州与印度尼西亚苏门答腊隔马六甲海峡相望？", "opts": ["柔佛", "雪兰莪", "马六甲", "霹雳"], "ans": 2, "exp": "马六甲州与印度尼西亚苏门答腊隔着马六甲海峡相望，马六甲海峡是世界最繁忙航运水道之一。"}, {"q": "以下哪项情境体现了信奉上苍？", "opts": ["遵守交通规则", "参与国会立法", "一家人及邻居按各自的宗教信仰为病人祈祷", "参加突击队训练"], "ans": 2, "exp": "课文举例（吉塔）：一家人和邻居按各自的宗教信仰为她发高烧的父亲祈祷，体现了信奉上苍及族群包容。"}, {"q": "以下哪个州的首府是哥打巴鲁（Kota Bharu），以传统马来文化著称？", "opts": ["丁加奴", "彭亨", "吉兰丹（Kelantan）", "霹雳"], "ans": 2, "exp": "吉兰丹州首府哥打巴鲁（Kota Bharu），以保存马来传统文化著称，包括皮影戏、风筝等。"}, {"q": "锡克族男性传统服装有什么特征？", "opts": ["穿旗袍", "穿纱丽", "穿长至膝盖的上衣和裤子及缠头巾", "穿绣花哥峇雅"], "ans": 2, "exp": "课文指出，锡克族男性的服装是长至膝盖的上衣和裤子（tahmat/tamba）及缠头巾，头巾是锡克文化的重要象征。"}, {"q": "独立前马来半岛原住民主要居住在哪里，从事什么经济活动？", "opts": ["市镇，经商", "园丘，种植橡胶", "内陆地区（霹雳、雪兰莪、彭亨、吉兰丹和登嘉楼），手工艺、狩猎与采集森林资源", "沿海，捕鱼"], "ans": 2, "exp": "课文指出，独立前，马来半岛原住民住在内陆地区，从事手工艺、狩猎与采集森林资源的工作。"}, {"q": "成立马来西亚的最初概念包括五个地方，哪个最终没有加入？", "opts": ["砂拉越", "沙巴", "新加坡", "汶莱"], "ans": 3, "exp": "成立马来西亚的最初概念包括马来亚联合邦、砂拉越、沙巴、新加坡与汶莱五个地方，但汶莱最终没有加入。"}, {"q": "葛波委员会（Suruhanjaya Cobbold）成立的日期是？", "opts": ["1961年7月23日", "1962年1月17日", "1962年6月21日", "1963年7月9日"], "ans": 1, "exp": "葛波委员会于1962年1月17日成立，目的是进行调查以收集砂拉越与沙巴的民意。"}, {"q": "东姑阿都拉曼所属政党是？", "opts": ["马华公会（MCA）", "马来民族统一机构（UMNO/巫统）", "人民行动党（PAP）", "砂拉越保守党（PESAKA）"], "ans": 1, "exp": "东姑阿都拉曼（Tunku Abdul Rahman Putra Al-Haj）是马来民族统一机构（UMNO/巫统）领袖。"}, {"q": "马尔科姆麦克唐纳（Malcolm MacDonald）于1951年就合并事宜进行会谈时，他的职务是什么？", "opts": ["葛波委员会主席", "英国北婆罗洲公司董事", "英国驻东南亚高级总督", "马来亚联合邦副首相"], "ans": 2, "exp": "课文指出，1951年，英国驻东南亚高级总督马尔科姆麦克唐纳就合并一事与马来亚联合邦、砂拉越、沙巴和新加坡的领袖进行了多次会谈。"}, {"q": "以下哪个族群是沙巴最大的族群？", "opts": ["伊班族", "巴瑶族", "卡达山杜顺族", "龙古斯族"], "ans": 2, "exp": "课文指出，卡达山杜顺族是沙巴最大的族群，其中的族群分支拥有自己的语言。"}, {"q": "槟城乔治市（George Town）的历史重要性是什么？", "opts": ["是马来西亚首都", "是英国在马来亚建立的第一个殖民地", "是马来西亚面积最大的州", "是马来西亚第一个宣告独立的州"], "ans": 1, "exp": "槟城（Penang）是英国在马来亚建立的第一个殖民地，弗朗西斯莱特于1786年占领槟城。"}, {"q": "马来半岛最南端的州是哪个？", "opts": ["马六甲", "森美兰", "柔佛", "雪兰莪"], "ans": 2, "exp": "柔佛州（Johor）位于马来半岛最南端，与新加坡之间以柔佛海峡相隔。"}, {"q": "颁布国家原则的是哪一任最高元首？", "opts": ["第二任", "第三任", "第四任", "第五任"], "ans": 2, "exp": "国家原则由第四任国家元首苏丹依斯迈纳西鲁丁沙（Tuanku Sultan Ismail Nasiruddin Shah）颁布。"}, {"q": "国家原则能塑造富有爱国精神的社会，爱国国民会尊重哪些国家象征？", "opts": ["政党旗帜", "城市标志", "国旗、国徽和国歌", "首相官邸"], "ans": 2, "exp": "课文指出，富有爱国精神的国民会效忠国家，愿意为国家牺牲，也会尊重国家主权的象征如国旗、国徽和国歌。"}, {"q": "以下哪个州的首府是新山（Johor Bahru）？", "opts": ["马六甲", "雪兰莪", "柔佛（Johor）", "森美兰"], "ans": 2, "exp": "柔佛州（Johor）首府是新山（Johor Bahru），与新加坡隔柔佛海峡相望，是马来西亚最南端的州。"}, {"q": "哈仑阿米努拉昔与依布拉欣耶谷在哪一年提出大马来由概念？", "opts": ["1887年", "1938年", "1951年", "1955年"], "ans": 1, "exp": "1938年，本地领袖依布拉欣耶谷（Ibrahim Haji Yaakob）和哈仑阿米努拉昔（Harun Aminurrashid）提出大马来由（Melayu Raya）的概念。"}, {"q": "沙巴的首府是哪个城市？", "opts": ["古晋", "诗巫", "美里", "亚庇（Kota Kinabalu）"], "ans": 3, "exp": "亚庇（Kota Kinabalu）是沙巴州的首府，以京那巴鲁山著称。"}, {"q": "在国家层面，实践国家原则有什么效果？", "opts": ["增加外汇储备", "社会和谐与安宁，能巩固国家的稳定和发展", "增加军备", "扩大领土"], "ans": 1, "exp": "课文指出，在国家层面：社会和谐与安宁，能巩固国家的稳定和发展。"}, {"q": "印度族男性的传统服装叫什么？", "opts": ["旗袍", "马来男装（baju Melayu）", "陀地（doti）", "长衫"], "ans": 2, "exp": "课文指出，印度男性服装是陀地（doti），是一种绕腰缠绕的传统白布。"}, {"q": "课文关于多元族群的核心结论是什么？", "opts": ["各族文化需要被改变", "各族群互相包容且和睦共处是马来西亚的特色，学习各族特色能培养爱国精神", "只需了解本族群特色", "不同族群之间无需了解彼此"], "ans": 1, "exp": "课文结语：各族群互相包容且和睦共处是马来西亚的特色，我们学习和分享各族群特色能够培养爱国精神。"}, {"q": "马来西亚成立给予的历史教诲是什么？", "opts": ["军事力量最重要", "各方的真诚、同理心和协商精神为我国带来繁荣与昌盛", "经济实力决定一切", "单一族群才能建国"], "ans": 1, "exp": "课文总结：马来西亚的成立给予我们许多历史教诲，各方的真诚、同理心和协商精神，为我国带来繁荣与昌盛。"}, {"q": "峇峇娘惹的传统服装是什么？", "opts": ["旗袍和长衫", "纱丽和陀地", "绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）", "马来套装和马来男装"], "ans": 2, "exp": "课文指出，峇峇娘惹的传统服装是绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）。"}, {"q": "以下哪个州被称为马来西亚米仓，是最重要的稻米产区？", "opts": ["霹雳", "彭亨", "吉打（Kedah）", "柔佛"], "ans": 2, "exp": "吉打州（Kedah）被称为马来西亚的米仓，是全国最重要的稻米产区，以优质大米著名。"}, {"q": "以下哪个联邦直辖区是最晚成立的？", "opts": ["吉隆坡（1974年）", "纳闽（1984年）", "布城（Putrajaya，2001年）", "三者同时成立"], "ans": 2, "exp": "布城于2001年成为马来西亚第三个联邦直辖区，是最晚成立的；吉隆坡1974年，纳闽1984年。"}, {"q": "马来西亚成立时汶莱没有加入，最终马来西亚由几个地方组成？", "opts": ["三个", "四个", "五个", "六个"], "ans": 1, "exp": "马来西亚最终由马来亚联合邦、砂拉越、沙巴与新加坡四个地方组成（汶莱没有加入）。"}, {"q": "JSKM成立的主要目的是什么？", "opts": ["收集砂拉越与沙巴民意", "加强砂拉越与沙巴领袖对成立马来西亚的信心", "制定宪法草案", "签署马来西亚协定"], "ans": 1, "exp": "课文指出，成立马来西亚忠诚委员会（JSKM）是为了加强砂拉越与沙巴领袖对成立马来西亚的信心。"}, {"q": "独立前印度族主要居住在哪里，从事什么经济活动？", "opts": ["市镇，经商", "园丘与市郊，园丘工作、小生意与码头工人", "内陆，农耕", "沿海，捕鱼"], "ans": 1, "exp": "课文指出，独立前，印度族住在园丘与市郊，从事园丘、小生意与码头工人的工作。"}, {"q": "国家原则第二项（忠于君国）的马来文是？", "opts": ["Kepercayaan kepada Tuhan", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 1, "exp": "国家原则第二项忠于君国的马来文是Kesetiaan kepada Raja dan Negara。"}, {"q": "第四任国家元首的全名是什么？", "opts": ["端姑阿都哈林", "端姑希沙慕丁", "苏丹依斯迈纳西鲁丁沙", "苏丹阿都拉"], "ans": 2, "exp": "颁布国家原则的第四任国家元首是苏丹依斯迈纳西鲁丁沙（Tuanku Sultan Ismail Nasiruddin Shah Ibni Almarhum Sultan Zainal Abidin）。"}, {"q": "国家原则第五项（培养德行）的马来文是？", "opts": ["Kepercayaan kepada Tuhan", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 3, "exp": "国家原则第五项培养德行的马来文是Kesopanan dan Kesusilaan。"}];

  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

<script>
const Q=[{"q": "1957年8月31日在马来西亚历史上代表什么？", "opts": ["马来西亚联邦成立", "马来亚联合邦宣告独立", "《马来西亚协定》签署", "葛波委员会成立"], "ans": 1, "exp": "1957年8月31日是马来亚联合邦宣告独立的日期，马来西亚联邦则于1963年9月16日才正式成立。"}, {"q": "以下哪项情境体现了忠于君国？", "opts": ["遵守交通规则", "扶老婆婆过马路", "参与国会立法", "参加国防部突击队训练，有志捍卫国家主权"], "ans": 3, "exp": "课文举例（沙吉星）：参与国防部突击队训练，有志于贡献国家、捍卫独立性和主权，体现了忠于君国。"}, {"q": "以下哪个州的首府是新山（Johor Bahru）？", "opts": ["马六甲", "雪兰莪", "柔佛（Johor）", "森美兰"], "ans": 2, "exp": "柔佛州（Johor）首府是新山（Johor Bahru），与新加坡隔柔佛海峡相望，是马来西亚最南端的州。"}, {"q": "有宗教信仰的社会能避免哪些问题？", "opts": ["交通堵塞", "嫉妒、背叛、贪污、滥用毒品和道德堕落", "农业问题", "经济通胀"], "ans": 1, "exp": "课文指出，有宗教信仰的社会能避免嫉妒、背叛、贪污、滥用毒品和道德堕落。"}, {"q": "国家原则培养德行的功能能为社会带来什么？", "opts": ["经济发展", "具有高尚德行的社会，带来和谐与安宁", "军事优先", "崇尚个人主义"], "ans": 1, "exp": "课文指出，国家原则能塑造具有高尚德行的马来西亚社会，为我国社会带来和谐与安宁。"}, {"q": "以下哪个州是马来西亚历史最悠久的城市马六甲城所在地，曾是重要国际贸易港？", "opts": ["霹雳", "雪兰莪", "马六甲（Melaka）", "柔佛"], "ans": 2, "exp": "马六甲州是马来西亚历史最悠久的城市所在地，马六甲王朝约建于1400年，曾是重要的国际贸易港口。"}, {"q": "敦拿督慕斯达法哈仑所属组织是？", "opts": ["砂拉越保守党（PESAKA）", "沙巴民族统一机构（USNO）", "人民行动党（PAP）", "砂拉越国民党（SNAP）"], "ans": 1, "exp": "敦拿督慕斯达法哈仑（Tun Datu Mustapha Datu Harun）是沙巴民族统一机构（USNO）领袖，向沙巴人民解释成立马来西亚的缘由。"}, {"q": "马来西亚国家行政中心布城（Putrajaya）隶属于哪个联邦直辖区？", "opts": ["吉隆坡", "雪兰莪", "布城（Putrajaya）本身就是联邦直辖区", "森美兰"], "ans": 2, "exp": "布城（Putrajaya）本身就是马来西亚三个联邦直辖区之一，于2001年独立成为联邦直辖区。"}, {"q": "仄迪族（Chetti）是哪两个群体通婚的后代？", "opts": ["英国人与本地人", "来自中国的商人与当地女性", "来自印度的商人与本地女子", "葡萄牙人与马来人"], "ans": 2, "exp": "课文指出，仄迪族（Chetti）或土生印度人是来自印度的商人与本地女子通婚后所生的后代。"}, {"q": "国家原则第二项（忠于君国）的马来文是？", "opts": ["Kepercayaan kepada Tuhan", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 1, "exp": "国家原则第二项忠于君国的马来文是Kesetiaan kepada Raja dan Negara。"}, {"q": "国家原则能塑造有高尚情操的社会，诚信的人能避免什么行为？", "opts": ["迟到早退", "在考试中作弊", "不做运动", "不读书"], "ans": 1, "exp": "课文举例，一个有诚信的人能避免在生活中犯错，例如在考试中作弊。"}, {"q": "东姑阿都拉曼在宣布马来西亚成立大典上高呼几声默迪卡？", "opts": ["三声", "五声", "七声", "九声"], "ans": 2, "exp": "课文图片说明记载：东姑阿都拉曼在宣布马来西亚成立的大典上高呼七声默迪卡。"}, {"q": "马来西亚成立时汶莱没有加入，最终马来西亚由几个地方组成？", "opts": ["三个", "四个", "五个", "六个"], "ans": 1, "exp": "马来西亚最终由马来亚联合邦、砂拉越、沙巴与新加坡四个地方组成（汶莱没有加入）。"}, {"q": "国家原则第三项（维护宪法）的马来文是？", "opts": ["Kedaulatan Undang-Undang", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 2, "exp": "国家原则第三项维护宪法的马来文是Keluhuran Perlembagaan。"}, {"q": "独立后各族居住模式发生了什么变化？", "opts": ["各族仍然分群居住", "各族群因经济活动而分群居住的问题已获解决，族群间包容精神促使他们一起工作", "各族间冲突加剧", "政府强制各族搬迁"], "ans": 1, "exp": "课文指出，独立与成立马来西亚后，各族群分群居住问题已获解决，族群间包容精神促使他们一起工作，同住一个地区。"}, {"q": "暹罗族在新年庆祝什么节日？", "opts": ["开斋节", "农历新年", "屠妖节", "泼水节"], "ans": 3, "exp": "课文指出，暹罗族在新年庆祝泼水节，并在暹樾举行仪式时穿上传统服装。"}, {"q": "课文关于多元族群的核心结论是什么？", "opts": ["各族文化需要被改变", "各族群互相包容且和睦共处是马来西亚的特色，学习各族特色能培养爱国精神", "只需了解本族群特色", "不同族群之间无需了解彼此"], "ans": 1, "exp": "课文结语：各族群互相包容且和睦共处是马来西亚的特色，我们学习和分享各族群特色能够培养爱国精神。"}, {"q": "大马来由（Melayu Raya）主张合并的地区包括哪些？", "opts": ["只有马来半岛和新加坡", "马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛", "只有砂拉越和沙巴", "只有马来半岛与泰国"], "ans": 1, "exp": "课文指出，大马来由主张把马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛合并起来。"}, {"q": "以下哪个是马来西亚的联邦行政首都？", "opts": ["吉隆坡", "布城（Putrajaya）", "莎阿南", "纳闽"], "ans": 1, "exp": "布城（Putrajaya）是马来西亚联邦政府的行政中心，1999年起政府机构陆续迁入。"}, {"q": "国家原则共有多少项功能？", "opts": ["三项", "四项", "五项", "六项"], "ans": 3, "exp": "课文列出国家原则的六项功能：塑造有宗教信仰的社会、塑造富有爱国精神的社会、培养尊重法治的态度、巩固社会团结、贯彻道德价值观、塑造有高尚情操的社会。"}, {"q": "砂拉越沿海的马来族、马兰诺族和卡达央族独立前从事什么活动？", "opts": ["种植稻米", "采集森林资源", "经商、造船和生产硕莪", "捕鱼和农耕"], "ans": 2, "exp": "课文指出，住在沿海的马来族、马兰诺族和卡达央族，从事经商、造船和生产硕莪的工作。"}, {"q": "联合国马来西亚任务调查团（UNMM）于哪一天到访？", "opts": ["1963年7月9日", "1963年8月12日", "1963年9月16日", "1962年6月21日"], "ans": 1, "exp": "联合国马来西亚任务调查团（UNMM）于1963年8月12日到访，以核实砂拉越与沙巴人民参组马来西亚的意向。"}, {"q": "沙巴和砂拉越位于哪个大岛上？", "opts": ["苏门答腊", "爪哇", "婆罗洲（Borneo）", "苏拉威西"], "ans": 2, "exp": "沙巴和砂拉越位于婆罗洲岛北部，婆罗洲是世界第三大岛。"}, {"q": "马来半岛原住民分为哪三大族群？", "opts": ["伊班族、比达友族、马兰诺族", "尼格利陀族（塞芒族）、塞诺伊族、原始马来人", "卡达山族、龙古斯族、苏禄族", "华族、印度族、马来族"], "ans": 1, "exp": "课文指出，马来西亚半岛原住民分为三大族群：尼格利陀族（又称塞芒族）、塞诺伊族和原始马来人。"}, {"q": "跨政府委员会（JAK）的马来文全称是什么？", "opts": ["Jawatankuasa Setia Kawan Malaysia", "Suruhanjaya Cobbold", "Jawatankuasa Antara Kerajaan", "Majlis Perundingan Negara"], "ans": 2, "exp": "跨政府委员会的马来文全称是Jawatankuasa Antara Kerajaan，缩写JAK。"}, {"q": "葛波委员会（Suruhanjaya Cobbold）成立的日期是？", "opts": ["1961年7月23日", "1962年1月17日", "1962年6月21日", "1963年7月9日"], "ans": 1, "exp": "葛波委员会于1962年1月17日成立，目的是进行调查以收集砂拉越与沙巴的民意。"}, {"q": "国家原则必须成为马来西亚人民的什么？", "opts": ["娱乐指南", "生活指南", "经济指南", "政治指南"], "ans": 1, "exp": "课文明确指出，国家原则必须成为马来西亚人民的生活指南。"}, {"q": "峇峇娘惹的传统服装是什么？", "opts": ["旗袍和长衫", "纱丽和陀地", "绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）", "马来套装和马来男装"], "ans": 2, "exp": "课文指出，峇峇娘惹的传统服装是绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）。"}, {"q": "以下哪个联邦直辖区是最晚成立的？", "opts": ["吉隆坡（1974年）", "纳闽（1984年）", "布城（Putrajaya，2001年）", "三者同时成立"], "ans": 2, "exp": "布城于2001年成为马来西亚第三个联邦直辖区，是最晚成立的；吉隆坡1974年，纳闽1984年。"}, {"q": "马来西亚最高峰京那巴鲁山位于哪个州？", "opts": ["砂拉越", "彭亨", "沙巴", "霹雳"], "ans": 2, "exp": "京那巴鲁山（Mount Kinabalu）海拔4,095米，位于沙巴州，是马来西亚最高峰。"}, {"q": "马来族男性的传统服装叫什么？", "opts": ["旗袍", "纱丽", "马来男装（baju Melayu）", "陀地（doti）"], "ans": 2, "exp": "课文指出，马来族的传统服装以女性马来套装（baju kurung）和男性马来男装（baju Melayu）为大家所熟悉。"}, {"q": "马六甲和槟城于哪一年被UNESCO列为世界文化遗产城市？", "opts": ["2000年", "2005年", "2008年", "2010年"], "ans": 2, "exp": "马六甲与槟城乔治市于2008年7月7日被联合国教科文组织列为世界文化遗产城市。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';
  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

<script>
const Q=[{"q": "独立前印度族主要居住在哪里，从事什么经济活动？", "opts": ["市镇，经商", "园丘与市郊，园丘工作、小生意与码头工人", "内陆，农耕", "沿海，捕鱼"], "ans": 1, "exp": "课文指出，独立前，印度族住在园丘与市郊，从事园丘、小生意与码头工人的工作。"}, {"q": "丹斯里拿督阿玛史蒂芬卡隆宁甘所属政党是？", "opts": ["沙统（USNO）", "砂拉越保守党（PESAKA）", "砂拉越国民党（SNAP）", "人民行动党"], "ans": 2, "exp": "丹斯里拿督阿玛史蒂芬卡隆宁甘（Tan Sri Datuk Amar Stephen Kalong Ningkan）是砂拉越国民党（SNAP）领袖，在成立砂拉越联盟方面有重要贡献。"}, {"q": "独立前马来族主要居住在哪里，从事什么经济活动？", "opts": ["市镇，采矿", "园丘，橡胶种植", "乡村、沿海地带与河畔，农耕、捕鱼、小生意与公共服务", "内陆，狩猎"], "ans": 2, "exp": "课文指出，独立前，马来族住在乡村、沿海地带与河畔，从事农耕、捕鱼、小生意与公共服务。"}, {"q": "以下哪个描述正确说明马来西亚州属的组成？", "opts": ["全部州在马来半岛", "13个州中11个在半岛，2个在婆罗洲", "全部州在婆罗洲", "只有5个州"], "ans": 1, "exp": "马来西亚13个州中，11个（西马）在马来半岛，2个（东马：沙巴和砂拉越）在婆罗洲岛北部。"}, {"q": "哈仑阿米努拉昔与依布拉欣耶谷在哪一年提出大马来由概念？", "opts": ["1887年", "1938年", "1951年", "1955年"], "ans": 1, "exp": "1938年，本地领袖依布拉欣耶谷（Ibrahim Haji Yaakob）和哈仑阿米努拉昔（Harun Aminurrashid）提出大马来由（Melayu Raya）的概念。"}, {"q": "制定国家原则的三大原因中，以下哪项是经济因素？", "opts": ["居住地区的分化", "政治理念的不同", "经济地位的落差", "外国侵略威胁"], "ans": 2, "exp": "课文列出制定国家原则的三个原因：经济地位的落差（经济因素）、居住地区的分化（社会因素）、政治理念的不同（政治因素）。"}, {"q": "马来西亚半岛11个州中，以下哪个州位于最北端与泰国接壤？", "opts": ["吉打", "吉兰丹", "槟城", "玻璃市（Perlis）"], "ans": 3, "exp": "玻璃市（Perlis）是马来西亚13个州中面积最小的州，位于马来半岛最北端，与泰国直接接壤。"}, {"q": "国家原则能塑造有高尚情操的社会，诚信的人能避免什么行为？", "opts": ["迟到早退", "在考试中作弊", "不做运动", "不读书"], "ans": 1, "exp": "课文举例，一个有诚信的人能避免在生活中犯错，例如在考试中作弊。"}, {"q": "敦拿督慕斯达法哈仑所属组织是？", "opts": ["砂拉越保守党（PESAKA）", "沙巴民族统一机构（USNO）", "人民行动党（PAP）", "砂拉越国民党（SNAP）"], "ans": 1, "exp": "敦拿督慕斯达法哈仑（Tun Datu Mustapha Datu Harun）是沙巴民族统一机构（USNO）领袖，向沙巴人民解释成立马来西亚的缘由。"}, {"q": "课文关于多元族群的核心结论是什么？", "opts": ["各族文化需要被改变", "各族群互相包容且和睦共处是马来西亚的特色，学习各族特色能培养爱国精神", "只需了解本族群特色", "不同族群之间无需了解彼此"], "ans": 1, "exp": "课文结语：各族群互相包容且和睦共处是马来西亚的特色，我们学习和分享各族群特色能够培养爱国精神。"}, {"q": "国家原则的宗旨是什么？", "opts": ["增加国防开支", "培养团结且具包容态度的国民", "促进对外贸易", "提高国民生产总值"], "ans": 1, "exp": "课文指出，国家原则旨在培养团结且具包容态度的国民，是促进忠诚与爱国精神的指南。"}, {"q": "国家原则培养德行的功能能为社会带来什么？", "opts": ["经济发展", "具有高尚德行的社会，带来和谐与安宁", "军事优先", "崇尚个人主义"], "ans": 1, "exp": "课文指出，国家原则能塑造具有高尚德行的马来西亚社会，为我国社会带来和谐与安宁。"}, {"q": "国家原则第三项（维护宪法）的马来文是？", "opts": ["Kedaulatan Undang-Undang", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 2, "exp": "国家原则第三项维护宪法的马来文是Keluhuran Perlembagaan。"}, {"q": "敦天猛公朱加巴里恩所属政党是？", "opts": ["沙统（USNO）", "砂拉越国民党（SNAP）", "砂拉越保守党（PESAKA）", "人民行动党（PAP）"], "ans": 2, "exp": "敦天猛公朱加巴里恩（Tun Temenggung Jugah anak Barieng）是砂拉越保守党（PESAKA）领袖，也是JSKM成员，并代表砂拉越签署《马来西亚协定》。"}, {"q": "国家原则第四项（尊崇法治）的马来文是？", "opts": ["Keluhuran Perlembagaan", "Kepercayaan kepada Tuhan", "Kesopanan dan Kesusilaan", "Kedaulatan Undang-Undang"], "ans": 3, "exp": "国家原则第四项尊崇法治的马来文是Kedaulatan Undang-Undang。"}, {"q": "东姑阿都拉曼所属政党是？", "opts": ["马华公会（MCA）", "马来民族统一机构（UMNO/巫统）", "人民行动党（PAP）", "砂拉越保守党（PESAKA）"], "ans": 1, "exp": "东姑阿都拉曼（Tunku Abdul Rahman Putra Al-Haj）是马来民族统一机构（UMNO/巫统）领袖。"}, {"q": "东姑阿都拉曼于1961年7月访问砂拉越的目的是什么？", "opts": ["签署《马来西亚协定》", "向当地领袖说明成立马来西亚的概念", "主持葛波委员会调查", "宣布马来西亚成立"], "ans": 1, "exp": "根据课文时间线，1961年7月东姑阿都拉曼访问砂拉越，目的是向当地领袖说明成立马来西亚的概念。"}, {"q": "课文中成立马来西亚的概念是由哪两方提出的？", "opts": ["马来族和华族", "本地领袖和英国殖民当局", "东南亚各国和联合国", "马来亚和印度尼西亚"], "ans": 1, "exp": "课文明确指出，成立马来西亚的最初概念是由本地领袖和英国殖民当局所提出的。"}, {"q": "原住民手工艺博物馆位于吉隆坡的哪条路？", "opts": ["安邦路", "白沙罗路（Jalan Damansara）", "打钵路", "双溪毛糯路"], "ans": 1, "exp": "课文指出，原住民手工艺博物馆位于吉隆坡的白沙罗路（Jalan Damansara），协助维护和发扬原住民的文化艺术遗产。"}, {"q": "彭亨州最著名的自然保护区是什么？", "opts": ["百乐公园", "塔曼尼加拉国家公园", "京那巴鲁国家公园", "珊瑚公园"], "ans": 1, "exp": "彭亨州拥有著名的塔曼尼加拉国家公园（Taman Negara），是全球最古老的热带雨林之一。"}, {"q": "以下哪项情境体现了忠于君国？", "opts": ["遵守交通规则", "扶老婆婆过马路", "参与国会立法", "参加国防部突击队训练，有志捍卫国家主权"], "ans": 3, "exp": "课文举例（沙吉星）：参与国防部突击队训练，有志于贡献国家、捍卫独立性和主权，体现了忠于君国。"}, {"q": "马来半岛北部与哪个国家接壤？", "opts": ["印度尼西亚", "新加坡", "泰国", "越南"], "ans": 2, "exp": "马来西亚半岛北部与泰国接壤，玻璃市和吉打是与泰国接壤的最北端州属。"}, {"q": "国家咨询理事会的马来文缩写是？", "opts": ["JAK", "JSKM", "MAPEN", "UNMM"], "ans": 2, "exp": "国家咨询理事会的马来文名称是Majlis Perundingan Negara，缩写为MAPEN。"}, {"q": "马来西亚面积最小的州是哪个？", "opts": ["槟城", "马六甲", "玻璃市", "森美兰"], "ans": 2, "exp": "玻璃市（Perlis）是马来西亚面积最小的州，位于马来半岛最北端，与泰国接壤。"}, {"q": "马来西亚面积最大的州是哪个？", "opts": ["沙巴", "砂拉越", "彭亨", "柔佛"], "ans": 1, "exp": "砂拉越是马来西亚面积最大的州，位于婆罗洲岛北部，约占马来西亚总面积的37%。"}, {"q": "峇峇娘惹使用什么语言沟通？", "opts": ["闽南语", "客家语", "峇峇语", "克里奥尔马来语"], "ans": 2, "exp": "课文指出，峇峇娘惹以峇峇语沟通，他们的生活方式、语言、风俗习惯和饮食文化与本地文化融合而成。"}, {"q": "暹罗族在新年庆祝什么节日？", "opts": ["开斋节", "农历新年", "屠妖节", "泼水节"], "ans": 3, "exp": "课文指出，暹罗族在新年庆祝泼水节，并在暹樾举行仪式时穿上传统服装。"}, {"q": "1957年8月31日在马来西亚历史上代表什么？", "opts": ["马来西亚联邦成立", "马来亚联合邦宣告独立", "《马来西亚协定》签署", "葛波委员会成立"], "ans": 1, "exp": "1957年8月31日是马来亚联合邦宣告独立的日期，马来西亚联邦则于1963年9月16日才正式成立。"}, {"q": "印度族女性的传统服装叫什么？", "opts": ["马来套装", "旗袍", "纱丽（sari）", "绣花哥峇雅"], "ans": 2, "exp": "课文指出，印度女性的传统服装是纱丽（sari），男性服装是陀地（doti）。"}, {"q": "仄迪族（Chetti）是哪两个群体通婚的后代？", "opts": ["英国人与本地人", "来自中国的商人与当地女性", "来自印度的商人与本地女子", "葡萄牙人与马来人"], "ans": 2, "exp": "课文指出，仄迪族（Chetti）或土生印度人是来自印度的商人与本地女子通婚后所生的后代。"}, {"q": "砂拉越的首府是哪个城市？", "opts": ["亚庇", "诗巫", "古晋（Kuching）", "美里"], "ans": 2, "exp": "古晋（Kuching）是砂拉越州的首府，以猫城之称著名。"}, {"q": "以下哪两个州没有世袭苏丹，由最高元首委任州元首治理？", "opts": ["霹雳和彭亨", "马六甲和槟城", "柔佛和雪兰莪", "吉打和玻璃市"], "ans": 1, "exp": "马六甲和槟城是马来西亚13个州中没有世袭苏丹的州，由最高元首委任的州元首（Yang di-Pertua Negeri）治理。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';
  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

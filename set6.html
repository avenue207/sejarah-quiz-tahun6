body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

.exp{display:none;margin-top:.8rem;background:#fff8e1;border-left:4px solid var(--gd);border-radius:0 7px 7px 0;padding:.65rem .9rem;font-size:13px;line-height:1.65;color:#5a4a1a}

#subBtn:hover{background:#253560}#subBtn:active{transform:scale(.97)}#subBtn:disabled{background:#aaa;cursor:not-allowed}
.warn{display:none;color:var(--rd);font-size:12.5px;margin-top:.45rem}
.rp{display:none;background:var(--wh);border:2px solid var(--nv);border-radius:14px;padding:2rem 1.5rem;text-align:center;margin:1.5rem 0}

.sc{width:108px;height:108px;border-radius:50%;background:var(--nv);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto .9rem;border:4px solid var(--gd)}

<script>
const Q=[{"q": "马来西亚于哪一天正式成立？", "opts": ["1957年8月31日", "1961年5月27日", "1963年9月16日", "1965年8月9日"], "ans": 2, "exp": "马来西亚于1963年9月16日正式成立，由马来亚联合邦、砂拉越、沙巴与新加坡合并组成联邦。"}, {"q": "马来西亚社会由哪些族群组成？", "opts": ["只有马来族和华族", "马来族、华族、印度族、半岛原住民、伊班族等多元族群", "只有三大民族", "只有马来族、华族、印度族"], "ans": 1, "exp": "课文指出，马来西亚各族群包括马来族、华族、印度族、半岛原住民、伊班族、马兰诺族、卡达山杜顺族、比达友族、巴瑶族和伊拉农族等。"}, {"q": "东马的两个州是什么？", "opts": ["霹雳和彭亨", "沙巴和砂拉越", "柔佛和马六甲", "槟城和霹雳"], "ans": 1, "exp": "东马来西亚由沙巴和砂拉越两个州组成，位于婆罗洲岛北部。"}, {"q": "国家原则的第二项原则是什么？", "opts": ["信奉上苍", "忠于君国", "维护宪法", "尊崇法治"], "ans": 1, "exp": "国家原则第二项是忠于君国（Kesetiaan kepada Raja dan Negara），强调对最高元首和国家的忠诚。"}, {"q": "以下哪个州首府是怡保（Ipoh），历史上以锡矿著称？", "opts": ["彭亨", "雪兰莪", "霹雳", "丁加奴"], "ans": 2, "exp": "霹雳州（Perak）的首府是怡保（Ipoh），历史上是马来西亚最重要的锡矿产区。"}, {"q": "马来族女性的传统服装叫什么？", "opts": ["旗袍", "纱丽", "马来套装（baju kurung）", "绣花哥峇雅"], "ans": 2, "exp": "课文指出，马来族的传统服装以女性马来套装（baju kurung）和男性马来男装（baju Melayu）为大家所熟悉。"}, {"q": "《马来西亚协定》在哪栋建筑物签署？", "opts": ["白金汉宫", "唐宁街10号", "马尔伯勒大楼", "国会大厦"], "ans": 2, "exp": "《马来西亚协定》于1963年7月9日在英国伦敦的马尔伯勒大楼（Marlborough House）签署。"}, {"q": "华族多以哪些语言沟通？", "opts": ["淡米尔语和马来语", "华语或方言如闽南语、客家语、粤语等", "伊班语和马来语", "旁遮普语和英语"], "ans": 1, "exp": "课文指出，华族多以华语或者方言如闽南语、客家语、粤语等沟通。"}, {"q": "华族传统服装主要以什么材料制成？", "opts": ["棉布", "丝绸", "亚麻", "蜡染布"], "ans": 1, "exp": "课文指出，华族的旗袍和长衫多数以柔软的丝绸制成。"}, {"q": "联合国马来西亚任务调查团（UNMM）的目的是什么？", "opts": ["调查共产党", "核实砂拉越与沙巴人民参组马来西亚的意向", "主持签署仪式", "提供军事援助"], "ans": 1, "exp": "联合国成立UNMM，以核实砂拉越与沙巴人民参组马来西亚的意向。"}, {"q": "以下哪个州首府是入保（Ipoh），是马来西亚第三大城市？", "opts": ["彭亨", "雪兰莪", "霹雳", "丁加奴"], "ans": 2, "exp": "怡保（Ipoh）是霹雳州首府，是马来西亚第三大城市，以白咖啡著名。"}, {"q": "国家原则的宗旨是什么？", "opts": ["增加国防开支", "培养团结且具包容态度的国民", "促进对外贸易", "提高国民生产总值"], "ans": 1, "exp": "课文指出，国家原则旨在培养团结且具包容态度的国民，是促进忠诚与爱国精神的指南。"}, {"q": "国家原则由哪个机构制定？", "opts": ["国会", "国家咨询理事会（MAPEN）属下的国家原则委员会", "内阁特别委员会", "最高元首御前会议"], "ans": 1, "exp": "国家原则于1970年3月4日，由国家咨询理事会（MAPEN）属下的国家原则委员会所制定。"}, {"q": "马来西亚的三个联邦直辖区不包括哪个？", "opts": ["吉隆坡", "布城", "纳闽", "莎阿南"], "ans": 3, "exp": "马来西亚的三个联邦直辖区是吉隆坡、布城（Putrajaya）和纳闽（Labuan），莎阿南是雪兰莪州首府。"}, {"q": "色拉尼族使用哪两种语言？", "opts": ["马来语和淡米尔语", "克里斯坦语（Kristang）和英语", "旁遮普语和马来语", "峇峇语和华语"], "ans": 1, "exp": "课文指出，色拉尼族使用克里斯坦语（Kristang）和英语。"}, {"q": "成立马来西亚与共产党威胁有关，属于哪个原因？", "opts": ["平衡族群结构", "保障国家安全", "加快独立步伐", "促进各邦发展"], "ans": 1, "exp": "课文指出，共产党威胁新加坡和砂拉越的治安，成立马来西亚能抵御共产党威胁，属于保障国家安全的原因。"}, {"q": "国家原则的第五项原则是什么？", "opts": ["信奉上苍", "忠于君国", "维护宪法", "培养德行"], "ans": 3, "exp": "国家原则第五项是培养德行（Kesopanan dan Kesusilaan），强调培养良好的道德观和行为举止。"}, {"q": "峇峇娘惹使用什么语言沟通？", "opts": ["闽南语", "客家语", "峇峇语", "克里奥尔马来语"], "ans": 2, "exp": "课文指出，峇峇娘惹以峇峇语沟通，他们的生活方式、语言、风俗习惯和饮食文化与本地文化融合而成。"}, {"q": "彭亨州最著名的自然保护区是什么？", "opts": ["百乐公园", "塔曼尼加拉国家公园", "京那巴鲁国家公园", "丁加奴珊瑚公园"], "ans": 1, "exp": "彭亨州拥有著名的塔曼尼加拉国家公园（Taman Negara），是全球最古老的热带雨林之一。"}, {"q": "东姑阿都拉曼属于哪个政党？", "opts": ["马华公会（MCA）", "马来民族统一机构（UMNO/巫统）", "人民行动党（PAP）", "砂拉越保守党（PESAKA）"], "ans": 1, "exp": "东姑阿都拉曼是马来民族统一机构（UMNO/巫统）领袖，也是马来亚联合邦首席部长。"}, {"q": "色拉尼族最著名的两种舞蹈是什么？", "opts": ["玛咏舞和萨平舞", "布兰乐舞（branyo）和法拉佩拉舞（frapeirra）", "狮子舞和龙舞", "苏马绍舞和社旺舞"], "ans": 1, "exp": "课文指出，色拉尼族最著名的舞蹈是布兰乐舞（branyo）和法拉佩拉舞（frapeirra）。"}, {"q": "国家原则的第一项原则是什么？", "opts": ["忠于君国", "维护宪法", "信奉上苍", "培养德行"], "ans": 2, "exp": "国家原则第一项是信奉上苍（Kepercayaan kepada Tuhan），强调宗教信仰的重要性。"}, {"q": "安沙骑自行车遵守交通规则，体现了哪项国家原则？", "opts": ["信奉上苍", "忠于君国", "维护宪法", "尊崇法治"], "ans": 3, "exp": "课文举例：安沙在来回学校路途中遵守交通规则，体现了尊崇法治的精神。"}, {"q": "课文中青年反毒运动图片说明国家原则的哪项功能？", "opts": ["塑造有宗教信仰的社会", "塑造富有爱国精神的社会", "培养尊重法治的态度", "巩固社会团结"], "ans": 2, "exp": "课文在培养尊重法治的态度部分展示青年反毒运动图片，说明国家原则能引导人民远离犯罪活动。"}, {"q": "制定国家原则的直接历史背景是什么？", "opts": ["马来西亚成立", "1957年独立", "1969年5月13日事件", "日本占领马来亚"], "ans": 2, "exp": "课文指出，1969年5月13日事件之后，国家行动理事会负责管制马来西亚，国家原则就是在那时制定的。"}, {"q": "葛波委员会移交报告是在哪一天？", "opts": ["1962年1月17日", "1962年6月21日", "1963年7月9日", "1963年8月12日"], "ans": 1, "exp": "葛波委员会于1962年6月21日移交民意调查报告予英国殖民当局与马来亚联合邦。"}, {"q": "为何成立马来西亚有助于平衡族群结构？", "opts": ["引进更多移民", "马来亚、砂拉越、沙巴与汶莱合并能平衡各族人口比例", "只合并新加坡即可", "华族人口减少"], "ans": 1, "exp": "只合并新加坡将导致族群结构不平衡；马来亚联合邦、砂拉越、沙巴与汶莱的合并才能平衡族群结构。"}, {"q": "仄迪族（Chetti）是哪两个群体通婚的后代？", "opts": ["英国人与本地人", "来自中国的商人与马六甲当地女性", "来自印度的商人与本地女子", "葡萄牙人与马来人"], "ans": 2, "exp": "课文指出，仄迪族（Chetti）或土生印度人是来自印度的商人与本地女子通婚后所生的后代。"}, {"q": "成立马来西亚能促进各邦发展，具体指的是什么？", "opts": ["增加英国收益", "促进基础建设、社会与经济发展，提升国民生活水平", "只有马来亚联合邦受惠", "加强军事力量"], "ans": 1, "exp": "课文指出，成立马来西亚能促进基础建设、社会与经济的发展，提升国民的生活水平。"}, {"q": "纳闽（Labuan）联邦直辖区位于哪里附近？", "opts": ["马来半岛西海岸", "砂拉越沿海", "沙巴西海岸外", "柔佛海峡"], "ans": 2, "exp": "纳闽是位于沙巴西海岸外的小岛，1984年成为联邦直辖区，是马来西亚国际离岸金融中心。"}, {"q": "以下哪个马来西亚州首府是新山（Johor Bahru）？", "opts": ["马六甲", "雪兰莪", "柔佛", "森美兰"], "ans": 2, "exp": "柔佛州（Johor）的首府是新山（Johor Bahru），与新加坡隔柔佛海峡相望。"}, {"q": "以下哪个州以马六甲王朝历史著称，曾是古代国际贸易港口？", "opts": ["霹雳", "雪兰莪", "马六甲", "柔佛"], "ans": 2, "exp": "马六甲州是马来西亚历史最悠久的城市所在地，马六甲王朝约建于1400年，曾是重要的国际贸易港口。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';
  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    d.innerHTML=`<div class="qh"><div class="qn">${i+1}</div><div class="qt">${q.q}</div></div>
    <div class="opts">${q.opts.map((o,j)=>`<button class="ob" id="o${i}_${j}" onclick="pick(${i},${j})"><span class="ol">${L[j]}</span><span>${o}</span></button>`).join('')}</div>
    <div class="exp" id="ex${i}"><strong>✓ 解析：</strong>${q.exp}</div>`;
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++){const b=document.getElementById('o'+qi+'_'+j);b.style.cssText='';}
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSubmit(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=ua===ra;if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！再接再厉！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题的解析，下次一定更好！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，你会进步更快的！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂每道题的解析，再来一次，必定进步！';}
  document.getElementById('rt').textContent=t;
  document.getElementById('rs').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script></body></html>

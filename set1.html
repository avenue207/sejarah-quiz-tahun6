<script>
const Q=[{"q": "国家原则培养了各族国民的哪三种精神？", "opts": ["竞争、进步、创新", "包容、合作与相互谅解的精神", "独立、自强、个人主义", "排外、保守、固步自封"], "ans": 1, "exp": "课文指出，国家原则培养了各族国民的包容、合作与相互谅解的精神，在塑造国民高尚情操方面至关重要。"}, {"q": "伊班族男性在嘉华节穿什么传统服装？", "opts": ["旗袍", "陀地", "鸟裳（baju burung）和哥兰比（kelambi）", "马来男装"], "ans": 2, "exp": "课文指出，伊班族男性在嘉华节或婚宴时会穿上鸟裳（baju burung）和哥兰比（kelambi）。"}, {"q": "独立前华族主要居住在哪里，从事什么经济活动？", "opts": ["乡村，捕鱼", "市镇与城市，采矿与经商", "园丘，种植橡胶", "内陆，狩猎"], "ans": 1, "exp": "课文指出，独立前，华族住在市镇与城市，从事采矿与经商。"}, {"q": "马来亚联合邦与新加坡的协商发生在哪一天？", "opts": ["1962年1月17日", "1962年8月30日", "1963年7月9日", "1963年9月16日"], "ans": 1, "exp": "根据课文时间线，1962年8月30日马来亚联合邦与新加坡进行协商。"}, {"q": "制定国家原则的直接历史背景是什么？", "opts": ["马来西亚加入联合国", "1963年马来西亚成立", "1969年5月13日事件", "日本占领马来亚"], "ans": 2, "exp": "课文指出，1969年5月13日事件之后，国家行动理事会负责管制马来西亚，国家原则就是在那时制定的。"}, {"q": "国家原则必须成为马来西亚人民的什么？", "opts": ["娱乐指南", "生活指南", "经济指南", "政治指南"], "ans": 1, "exp": "课文明确指出，国家原则必须成为马来西亚人民的生活指南。"}, {"q": "独立后各族居住模式发生了什么变化？", "opts": ["各族仍然分群居住", "各族群因经济活动而分群居住的问题已获解决，族群间包容精神促使他们一起工作", "各族间冲突加剧", "政府强制各族搬迁"], "ans": 1, "exp": "课文指出，独立与成立马来西亚后，各族群分群居住问题已获解决，族群间包容精神促使他们一起工作，同住一个地区。"}, {"q": "国家原则第一项（信奉上苍）的马来文是？", "opts": ["Kesetiaan kepada Raja dan Negara", "Kepercayaan kepada Tuhan", "Keluhuran Perlembagaan", "Kedaulatan Undang-Undang"], "ans": 1, "exp": "国家原则第一项信奉上苍的马来文是Kepercayaan kepada Tuhan。"}, {"q": "以下哪个州以其独特的长屋（Rumah Panjang）文化著称，是伊班族的聚居地？", "opts": ["霹雳", "彭亨", "砂拉越（Sarawak）", "雪兰莪"], "ans": 2, "exp": "砂拉越的土著族群，尤其是伊班族，以传统的长屋（Rumah Panjang）文化著称，一栋长屋可容纳多户家庭共同居住。"}, {"q": "以下哪个描述正确说明马来西亚州属的组成？", "opts": ["全部州在马来半岛", "13个州中11个在半岛，2个在婆罗洲", "全部州在婆罗洲", "只有5个州"], "ans": 1, "exp": "马来西亚13个州中，11个（西马）在马来半岛，2个（东马：沙巴和砂拉越）在婆罗洲岛北部。"}, {"q": "大马来由（Melayu Raya）主张合并的地区包括哪些？", "opts": ["只有马来半岛和新加坡", "马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛", "只有砂拉越和沙巴", "只有马来半岛与泰国"], "ans": 1, "exp": "课文指出，大马来由主张把马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛合并起来。"}, {"q": "马来西亚半岛（西马）共有多少个州？", "opts": ["9个", "11个", "13个", "15个"], "ans": 1, "exp": "马来西亚半岛共有11个州：玻璃市、吉打、槟城、霹雳、吉兰丹、丁加奴、彭亨、雪兰莪、森美兰、马六甲和柔佛。"}, {"q": "马六甲和槟城于哪一年被UNESCO列为世界文化遗产城市？", "opts": ["2000年", "2005年", "2008年", "2010年"], "ans": 2, "exp": "马六甲与槟城乔治市于2008年7月7日被联合国教科文组织列为世界文化遗产城市。"}, {"q": "《马来西亚协定》签署的日期是？", "opts": ["1962年6月21日", "1963年7月9日", "1963年8月12日", "1963年9月16日"], "ans": 1, "exp": "《马来西亚协定》于1963年7月9日在英国伦敦的马尔伯勒大楼（Marlborough House）签署。"}, {"q": "国家原则共有多少项原则？", "opts": ["三项", "四项", "五项", "六项"], "ans": 2, "exp": "国家原则共有五项原则：信奉上苍、忠于君国、维护宪法、尊崇法治、培养德行。"}, {"q": "各族群的文化特色需要大家如何对待？", "opts": ["可以忘记", "改变其文化", "珍惜各族群的文化特色才能发扬光大", "只保留马来族文化"], "ans": 2, "exp": "课文指出，各族群的文化特色需要大家的珍惜，才能发扬光大。"}, {"q": "以下哪个州首府是怡保（Ipoh），历史上以锡矿著称？", "opts": ["彭亨", "雪兰莪", "霹雳", "丁加奴"], "ans": 2, "exp": "霹雳州（Perak）首府怡保（Ipoh），历史上是马来西亚最重要的锡矿产区，怡保曾有锡都之称。"}, {"q": "负责制定国家原则的具体机构是什么？", "opts": ["国会", "内阁特别委员会", "国家咨询理事会（MAPEN）属下的国家原则委员会", "最高元首御前会议"], "ans": 2, "exp": "国家原则于1970年3月4日由国家咨询理事会（MAPEN）属下的国家原则委员会所制定。"}, {"q": "以下哪两个州没有世袭苏丹，由最高元首委任州元首治理？", "opts": ["霹雳和彭亨", "马六甲和槟城", "柔佛和雪兰莪", "吉打和玻璃市"], "ans": 1, "exp": "马六甲和槟城是马来西亚13个州中没有世袭苏丹的州，由最高元首委任的州元首（Yang di-Pertua Negeri）治理。"}, {"q": "成立马来西亚的最初概念包括五个地方，哪个最终没有加入？", "opts": ["砂拉越", "沙巴", "新加坡", "汶莱"], "ans": 3, "exp": "成立马来西亚的最初概念包括马来亚联合邦、砂拉越、沙巴、新加坡与汶莱五个地方，但汶莱最终没有加入。"}, {"q": "马来西亚共有多少个州加上联邦直辖区？", "opts": ["11个州和2个联邦直辖区", "13个州和3个联邦直辖区", "12个州和3个联邦直辖区", "14个州和1个联邦直辖区"], "ans": 1, "exp": "马来西亚由13个州和3个联邦直辖区（吉隆坡、布城、纳闽）组成。"}, {"q": "敦拿督慕斯达法哈仑所属组织是？", "opts": ["砂拉越保守党（PESAKA）", "沙巴民族统一机构（USNO）", "人民行动党（PAP）", "砂拉越国民党（SNAP）"], "ans": 1, "exp": "敦拿督慕斯达法哈仑（Tun Datu Mustapha Datu Harun）是沙巴民族统一机构（USNO）领袖，向沙巴人民解释成立马来西亚的缘由。"}, {"q": "峇峇和娘惹是哪两个群体通婚的后代？", "opts": ["英国人与马来人", "来自中国的商人与马六甲当地女性", "印度商人与华族女性", "葡萄牙人与马来人"], "ans": 1, "exp": "课文指出，峇峇和娘惹是早期来自中国的商人和马六甲当地女性通婚的后代，男性称峇峇（Baba），女性称娘惹（Nyonya）。"}, {"q": "颁布国家原则的是哪一任最高元首？", "opts": ["第二任", "第三任", "第四任", "第五任"], "ans": 2, "exp": "国家原则由第四任国家元首苏丹依斯迈纳西鲁丁沙（Tuanku Sultan Ismail Nasiruddin Shah）颁布。"}, {"q": "峇峇娘惹的传统服装是什么？", "opts": ["旗袍和长衫", "纱丽和陀地", "绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）", "马来套装和马来男装"], "ans": 2, "exp": "课文指出，峇峇娘惹的传统服装是绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）。"}, {"q": "以下哪项说明了成立马来西亚与共产党有关的原因？", "opts": ["促进各邦发展", "加快独立步伐", "保障国家安全", "平衡族群结构"], "ans": 2, "exp": "课文指出，共产党不但威胁新加坡，也影响马来亚联合邦的治安，东姑阿都拉曼认为新加坡会成为共产党基地，成立马来西亚能抵御共产党威胁，属于保障国家安全。"}, {"q": "国家原则第三项（维护宪法）的马来文是？", "opts": ["Kedaulatan Undang-Undang", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 2, "exp": "国家原则第三项维护宪法的马来文是Keluhuran Perlembagaan。"}, {"q": "跨政府委员会（JAK）由哪几方的代表组成？", "opts": ["只有马来亚联合邦代表", "英国、马来亚联合邦、砂拉越与沙巴代表", "联合国代表", "只有英国代表"], "ans": 1, "exp": "课文指出，跨政府委员会由英国、马来亚联合邦、砂拉越与沙巴代表组成，负责制定保障砂拉越与沙巴权益的宪法草案。"}, {"q": "马来西亚成立宣布仪式在哪几个地方举行？", "opts": ["吉隆坡、槟城、新山、古晋", "吉隆坡、古晋、亚庇、新加坡", "吉隆坡、槟城、怡保、亚庇", "吉隆坡、马六甲、古晋、亚庇"], "ans": 1, "exp": "1963年9月16日，马来西亚成立宣布仪式同时在吉隆坡、砂拉越古晋、沙巴亚庇和新加坡市政厅举行。"}, {"q": "马来西亚半岛11个州中，以下哪个州位于最北端与泰国接壤？", "opts": ["吉打", "吉兰丹", "槟城", "玻璃市（Perlis）"], "ans": 3, "exp": "玻璃市（Perlis）是马来西亚13个州中面积最小的州，位于马来半岛最北端，与泰国直接接壤。"}, {"q": "沙巴龙古斯族以什么著名？", "opts": ["造船", "种植稻米", "手工艺品", "采集海产"], "ans": 2, "exp": "课文指出，大部份龙古斯族住在内陆地区，龙古斯族以手工艺品闻名。"}, {"q": "马来族男性的传统服装叫什么？", "opts": ["旗袍", "纱丽", "马来男装（baju Melayu）", "陀地（doti）"], "ans": 2, "exp": "课文指出，马来族的传统服装以女性马来套装（baju kurung）和男性马来男装（baju Melayu）为大家所熟悉。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';

  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

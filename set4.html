body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

.exp{display:none;margin-top:.75rem;background:#fff8e1;border-left:4px solid var(--gd);border-radius:0 7px 7px 0;padding:.6rem .85rem;font-size:13px;line-height:1.65;color:#5a4a1a}

#subBtn{background:var(--nv);color:#fff;font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:700;padding:.78rem 2.4rem;border:none;border-radius:99px;cursor:pointer;letter-spacing:.07em;transition:background .2s}
#subBtn:hover{background:#253560}#subBtn:active{transform:scale(.97)}#subBtn:disabled{background:#aaa;cursor:not-allowed}
.warn{display:none;color:var(--rd);font-size:12px;margin-top:.4rem}
.rp{display:none;background:var(--wh);border:2px solid var(--nv);border-radius:14px;padding:1.8rem 1.4rem;text-align:center;margin:1.5rem 0}
.rp.show{display:block}
.sc{width:106px;height:106px;border-radius:50%;background:var(--nv);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto .85rem;border:4px solid var(--gd)}

.rtl{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;color:var(--nv);margin-bottom:4px}

.btn-nxt{display:inline-block;background:var(--gd);color:var(--nv);font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:700;padding:.52rem 1.5rem;border-radius:99px;text-decoration:none;letter-spacing:.04em}

<script>
const Q=[{"q": "以下哪项是国家原则尊崇法治的实际意义？", "opts": ["可以选择性遵守法律", "法律只适用于某些人", "法律至上，每个人都必须遵守法律", "法律只适用于犯罪者"], "ans": 2, "exp": "尊崇法治强调法律至上，每个人不论身份都必须遵守法律，遵守法律能带来社会和谐与安宁。"}, {"q": "国家原则培养德行的功能能为社会带来什么？", "opts": ["经济发展", "具有高尚德行的社会，带来和谐与安宁", "军事优先", "崇尚个人主义"], "ans": 1, "exp": "课文指出，国家原则能塑造具有高尚德行的马来西亚社会，为我国社会带来和谐与安宁。"}, {"q": "《马来西亚协定》在哪栋建筑物签署？", "opts": ["白金汉宫", "唐宁街10号", "马尔伯勒大楼", "国会大厦"], "ans": 2, "exp": "课文指出，《马来西亚协定》在英国伦敦的马尔伯勒大楼（Marlborough House）签署。"}, {"q": "马来半岛最南端的州是哪个？", "opts": ["马六甲", "森美兰", "柔佛", "雪兰莪"], "ans": 2, "exp": "柔佛州（Johor）位于马来半岛最南端，与新加坡之间以柔佛海峡相隔。"}, {"q": "《马来西亚协定》签署的日期是？", "opts": ["1962年6月21日", "1963年7月9日", "1963年8月12日", "1963年9月16日"], "ans": 1, "exp": "《马来西亚协定》于1963年7月9日在英国伦敦的马尔伯勒大楼（Marlborough House）签署。"}, {"q": "马来亚联合邦与新加坡的协商发生在哪一天？", "opts": ["1962年1月17日", "1962年8月30日", "1963年7月9日", "1963年9月16日"], "ans": 1, "exp": "根据课文时间线，1962年8月30日马来亚联合邦与新加坡进行协商。"}, {"q": "大马来由（Melayu Raya）主张合并的地区包括哪些？", "opts": ["只有马来半岛和新加坡", "马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛", "只有砂拉越和沙巴", "只有马来半岛与泰国"], "ans": 1, "exp": "课文指出，大马来由主张把马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛合并起来。"}, {"q": "在社会层面，实践国家原则有什么效果？", "opts": ["个人财富增加", "包容与相互谅解，为社会带来和谐与安宁", "军事力量增强", "出口增加"], "ans": 1, "exp": "课文指出，社会层面：包容与相互谅解，为社会带来和谐与安宁。"}, {"q": "马六甲和槟城于哪一年被UNESCO列为世界文化遗产城市？", "opts": ["2000年", "2005年", "2008年", "2010年"], "ans": 2, "exp": "马六甲与槟城乔治市于2008年7月7日被联合国教科文组织列为世界文化遗产城市。"}, {"q": "以下哪个是马来西亚的联邦直辖区？", "opts": ["雪兰莪", "霹雳", "纳闽（Labuan）", "柔佛"], "ans": 2, "exp": "马来西亚的三个联邦直辖区是吉隆坡、布城（Putrajaya）和纳闽（Labuan）。"}, {"q": "以下哪个州首府是怡保（Ipoh），历史上以锡矿著称？", "opts": ["彭亨", "雪兰莪", "霹雳", "丁加奴"], "ans": 2, "exp": "霹雳州（Perak）首府怡保（Ipoh），历史上是马来西亚最重要的锡矿产区，怡保曾有锡都之称。"}, {"q": "以下哪项情境体现了培养德行？", "opts": ["遵守交通规则", "参与国会立法", "主动扶老婆婆过马路", "参加突击队训练"], "ans": 2, "exp": "课文举例（马蒂雅娜）：主动扶老婆婆过马路，体现了培养德行的精神。"}, {"q": "独立前印度族主要居住在哪里，从事什么经济活动？", "opts": ["市镇，经商", "园丘与市郊，园丘工作、小生意与码头工人", "内陆，农耕", "沿海，捕鱼"], "ans": 1, "exp": "课文指出，独立前，印度族住在园丘与市郊，从事园丘、小生意与码头工人的工作。"}, {"q": "原住民手工艺博物馆位于吉隆坡的哪条路？", "opts": ["安邦路", "白沙罗路（Jalan Damansara）", "打钵路", "双溪毛糯路"], "ans": 1, "exp": "课文指出，原住民手工艺博物馆位于吉隆坡的白沙罗路（Jalan Damansara），协助维护和发扬原住民的文化艺术遗产。"}, {"q": "葛波委员会（Suruhanjaya Cobbold）成立的日期是？", "opts": ["1961年7月23日", "1962年1月17日", "1962年6月21日", "1963年7月9日"], "ans": 1, "exp": "葛波委员会于1962年1月17日成立，目的是进行调查以收集砂拉越与沙巴的民意。"}, {"q": "槟城乔治市（George Town）的历史重要性是什么？", "opts": ["是马来西亚首都", "是英国在马来亚建立的第一个殖民地", "是马来西亚面积最大的州", "是马来西亚第一个宣告独立的州"], "ans": 1, "exp": "槟城（Penang）是英国在马来亚建立的第一个殖民地，弗朗西斯莱特于1786年占领槟城。"}, {"q": "以下哪两个州没有世袭苏丹，由最高元首委任州元首治理？", "opts": ["霹雳和彭亨", "马六甲和槟城", "柔佛和雪兰莪", "吉打和玻璃市"], "ans": 1, "exp": "马六甲和槟城是马来西亚13个州中没有世袭苏丹的州，由最高元首委任的州元首（Yang di-Pertua Negeri）治理。"}, {"q": "色拉尼族使用哪两种语言？", "opts": ["马来语和淡米尔语", "克里斯坦语（Kristang）和英语", "旁遮普语和马来语", "峇峇语和华语"], "ans": 1, "exp": "课文指出，色拉尼族使用克里斯坦语（Kristang）和英语。"}, {"q": "在国家层面，实践国家原则有什么效果？", "opts": ["增加外汇储备", "社会和谐与安宁，能巩固国家的稳定和发展", "增加军备", "扩大领土"], "ans": 1, "exp": "课文指出，在国家层面：社会和谐与安宁，能巩固国家的稳定和发展。"}, {"q": "新加坡公投的结果是什么？", "opts": ["人民反对成立马来西亚", "结果各半", "人民支持成立马来西亚", "公投被取消"], "ans": 2, "exp": "新加坡举行的公投结果显示，新加坡人民支持成立马来西亚。"}, {"q": "华族女性的传统服装是什么？", "opts": ["马来套装", "纱丽", "旗袍", "绣花哥峇雅"], "ans": 2, "exp": "课文指出，华族女性的传统服装是旗袍，男性的是长衫，这些服装多数以柔软的丝绸制成。"}, {"q": "李光耀所属政党是什么？", "opts": ["马来民族统一机构（UMNO）", "马华公会（MCA）", "新加坡人民行动党（PAP）", "砂拉越保守党（PESAKA）"], "ans": 2, "exp": "李光耀（Lee Kuan Yew）是新加坡人民行动党（People's Action Party，PAP）领袖，支持成立马来西亚以阻断共产主义在新加坡的扩张。"}, {"q": "仄迪族（Chetti）是哪两个群体通婚的后代？", "opts": ["英国人与本地人", "来自中国的商人与当地女性", "来自印度的商人与本地女子", "葡萄牙人与马来人"], "ans": 2, "exp": "课文指出，仄迪族（Chetti）或土生印度人是来自印度的商人与本地女子通婚后所生的后代。"}, {"q": "国家原则的宗旨是什么？", "opts": ["增加国防开支", "培养团结且具包容态度的国民", "促进对外贸易", "提高国民生产总值"], "ans": 1, "exp": "课文指出，国家原则旨在培养团结且具包容态度的国民，是促进忠诚与爱国精神的指南。"}, {"q": "色拉尼族最著名的两种舞蹈是什么？", "opts": ["玛咏舞和萨平舞", "布兰乐舞（branyo）和法拉佩拉舞（frapeirra）", "狮子舞和龙舞", "苏马绍舞和社旺舞"], "ans": 1, "exp": "课文指出，色拉尼族最著名的舞蹈是布兰乐舞（branyo）和法拉佩拉舞（frapeirra）。"}, {"q": "JSKM于哪一天成立？", "opts": ["1961年5月27日", "1961年7月23日", "1962年1月17日", "1963年9月16日"], "ans": 1, "exp": "马来西亚忠诚委员会（JSKM）于1961年7月23日成立。"}, {"q": "以下哪个州是马来西亚人口最多、工业最发达的州？", "opts": ["柔佛", "霹雳", "雪兰莪（Selangor）", "彭亨"], "ans": 2, "exp": "雪兰莪州（Selangor）是马来西亚人口最多、工业最发达的州，吉隆坡联邦直辖区由其分出。"}, {"q": "色拉尼族（Serani）是哪两个群体通婚的后代？", "opts": ["英国人与华族", "荷兰人与印度族", "葡萄牙人与本地人", "中国商人与马来人"], "ans": 2, "exp": "课文指出，色拉尼族（Serani）又称欧亚裔，是葡萄牙人和本地人通婚的后代。"}, {"q": "伊班族男性在嘉华节穿什么传统服装？", "opts": ["旗袍", "陀地", "鸟裳（baju burung）和哥兰比（kelambi）", "马来男装"], "ans": 2, "exp": "课文指出，伊班族男性在嘉华节或婚宴时会穿上鸟裳（baju burung）和哥兰比（kelambi）。"}, {"q": "砂拉越的首府是哪个城市？", "opts": ["亚庇", "诗巫", "古晋（Kuching）", "美里"], "ans": 2, "exp": "古晋（Kuching）是砂拉越州的首府，以猫城之称著名。"}, {"q": "国家原则第四项（尊崇法治）的马来文是？", "opts": ["Keluhuran Perlembagaan", "Kepercayaan kepada Tuhan", "Kesopanan dan Kesusilaan", "Kedaulatan Undang-Undang"], "ans": 3, "exp": "国家原则第四项尊崇法治的马来文是Kedaulatan Undang-Undang。"}, {"q": "以下哪项是国家原则忠于君国中君所指的人物？", "opts": ["首相", "州苏丹", "最高元首（Yang di-Pertuan Agong）", "英国国王"], "ans": 2, "exp": "国家原则忠于君国中的君是指马来西亚最高元首（Yang di-Pertuan Agong），国是指马来西亚国家。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';
  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>

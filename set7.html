<script>
const Q=[{"q": "以下哪个州是马来西亚历史最悠久的城市马六甲城所在地，曾是重要国际贸易港？", "opts": ["霹雳", "雪兰莪", "马六甲（Melaka）", "柔佛"], "ans": 2, "exp": "马六甲州是马来西亚历史最悠久的城市所在地，马六甲王朝约建于1400年，曾是重要的国际贸易港口。"}, {"q": "锡克族的母语是什么？", "opts": ["淡米尔语", "泰卢固语", "旁遮普语（bahasa Punjabi）", "克里斯坦语"], "ans": 2, "exp": "课文明确指出，锡克族的母语是旁遮普语（bahasa Punjabi）。"}, {"q": "东姑阿都拉曼所属政党是？", "opts": ["马华公会（MCA）", "马来民族统一机构（UMNO/巫统）", "人民行动党（PAP）", "砂拉越保守党（PESAKA）"], "ans": 1, "exp": "东姑阿都拉曼（Tunku Abdul Rahman Putra Al-Haj）是马来民族统一机构（UMNO/巫统）领袖。"}, {"q": "华族女性的传统服装是什么？", "opts": ["马来套装", "纱丽", "旗袍", "绣花哥峇雅"], "ans": 2, "exp": "课文指出，华族女性的传统服装是旗袍，男性的是长衫，这些服装多数以柔软的丝绸制成。"}, {"q": "国家原则第五项（培养德行）的马来文是？", "opts": ["Kepercayaan kepada Tuhan", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 3, "exp": "国家原则第五项培养德行的马来文是Kesopanan dan Kesusilaan。"}, {"q": "马来西亚首都吉隆坡属于什么类型的行政区划？", "opts": ["普通州", "联邦直辖区", "自治区", "特别行政区"], "ans": 1, "exp": "吉隆坡是马来西亚联邦直辖区，直属联邦政府管辖，是马来西亚首都和最大城市。"}, {"q": "马来西亚成立给予的历史教诲是什么？", "opts": ["军事力量最重要", "各方的真诚、同理心和协商精神为我国带来繁荣与昌盛", "经济实力决定一切", "单一族群才能建国"], "ans": 1, "exp": "课文总结：马来西亚的成立给予我们许多历史教诲，各方的真诚、同理心和协商精神，为我国带来繁荣与昌盛。"}, {"q": "色拉尼族（Serani）是哪两个群体通婚的后代？", "opts": ["英国人与华族", "荷兰人与印度族", "葡萄牙人与本地人", "中国商人与马来人"], "ans": 2, "exp": "课文指出，色拉尼族（Serani）又称欧亚裔，是葡萄牙人和本地人通婚的后代。"}, {"q": "以下哪个州的首府是哥打巴鲁（Kota Bharu），以传统马来文化著称？", "opts": ["丁加奴", "彭亨", "吉兰丹（Kelantan）", "霹雳"], "ans": 2, "exp": "吉兰丹州首府哥打巴鲁（Kota Bharu），以保存马来传统文化著称，包括皮影戏、风筝等。"}, {"q": "仄迪族多数居住在哪里？", "opts": ["槟城", "吉隆坡", "马六甲", "新山"], "ans": 2, "exp": "课文指出，仄迪族多数居住在马六甲，沟通语是克里奥尔马来语（Melayu kreol）。"}, {"q": "东姑阿都拉曼于1955年提出成立马来西亚时，他当时的职务是什么？", "opts": ["马来亚联合邦首相", "马来亚联合邦首席部长", "砂拉越首席部长", "新加坡总理"], "ans": 1, "exp": "课文指出，1955年马来亚联合邦首席部长东姑阿都拉曼提出联合的概念，他建议新加坡、砂拉越、沙巴和汶莱加入马来亚联合邦。"}, {"q": "领会和实践国家原则对个人有什么益处？", "opts": ["获得更多财富", "使我们成为有礼和懂得相互谅解的人", "获得更高政治地位", "赢得国际认可"], "ans": 1, "exp": "课文温故知新总结：领会和实践国家原则，使我们成为有礼和懂得相互谅解的人。"}, {"q": "以下哪个州以其独特的长屋（Rumah Panjang）文化著称，是伊班族的聚居地？", "opts": ["霹雳", "彭亨", "砂拉越（Sarawak）", "雪兰莪"], "ans": 2, "exp": "砂拉越的土著族群，尤其是伊班族，以传统的长屋（Rumah Panjang）文化著称，一栋长屋可容纳多户家庭共同居住。"}, {"q": "国家原则的宗旨是什么？", "opts": ["增加国防开支", "培养团结且具包容态度的国民", "促进对外贸易", "提高国民生产总值"], "ans": 1, "exp": "课文指出，国家原则旨在培养团结且具包容态度的国民，是促进忠诚与爱国精神的指南。"}, {"q": "负责制定国家原则的具体机构是什么？", "opts": ["国会", "内阁特别委员会", "国家咨询理事会（MAPEN）属下的国家原则委员会", "最高元首御前会议"], "ans": 2, "exp": "国家原则于1970年3月4日由国家咨询理事会（MAPEN）属下的国家原则委员会所制定。"}, {"q": "新加坡公投的结果是什么？", "opts": ["人民反对成立马来西亚", "结果各半", "人民支持成立马来西亚", "公投被取消"], "ans": 2, "exp": "新加坡举行的公投结果显示，新加坡人民支持成立马来西亚。"}, {"q": "只合并新加坡与马来亚联合邦会导致什么问题？", "opts": ["经济发展失衡", "族群结构不平衡", "共产党威胁加剧", "基础设施不足"], "ans": 1, "exp": "课文指出，只合并新加坡与马来亚联合邦将导致族群结构不平衡；因此必须加入砂拉越和沙巴以平衡各族人口比例。"}, {"q": "以下哪项情境体现了培养德行？", "opts": ["遵守交通规则", "参与国会立法", "主动扶老婆婆过马路", "参加突击队训练"], "ans": 2, "exp": "课文举例（马蒂雅娜）：主动扶老婆婆过马路，体现了培养德行的精神。"}, {"q": "以下哪个州与印度尼西亚苏门答腊隔马六甲海峡相望？", "opts": ["柔佛", "雪兰莪", "马六甲", "霹雳"], "ans": 2, "exp": "马六甲州与印度尼西亚苏门答腊隔着马六甲海峡相望，马六甲海峡是世界最繁忙航运水道之一。"}, {"q": "以下哪项情境体现了忠于君国？", "opts": ["遵守交通规则", "扶老婆婆过马路", "参与国会立法", "参加国防部突击队训练，有志捍卫国家主权"], "ans": 3, "exp": "课文举例（沙吉星）：参与国防部突击队训练，有志于贡献国家、捍卫独立性和主权，体现了忠于君国。"}, {"q": "国家原则必须成为马来西亚人民的什么？", "opts": ["娱乐指南", "生活指南", "经济指南", "政治指南"], "ans": 1, "exp": "课文明确指出，国家原则必须成为马来西亚人民的生活指南。"}, {"q": "锡克族男性传统服装有什么特征？", "opts": ["穿旗袍", "穿纱丽", "穿长至膝盖的上衣和裤子及缠头巾", "穿绣花哥峇雅"], "ans": 2, "exp": "课文指出，锡克族男性的服装是长至膝盖的上衣和裤子（tahmat/tamba）及缠头巾，头巾是锡克文化的重要象征。"}, {"q": "以下哪项情境体现了尊崇法治？", "opts": ["在考试中作弊", "骑自行车遵守交通规则", "随意停车", "不尊重师长"], "ans": 1, "exp": "课文举例（安沙）：骑自行车上学时遵守交通规则，体现了尊崇法治的精神。"}, {"q": "马来族男性的传统服装叫什么？", "opts": ["旗袍", "纱丽", "马来男装（baju Melayu）", "陀地（doti）"], "ans": 2, "exp": "课文指出，马来族的传统服装以女性马来套装（baju kurung）和男性马来男装（baju Melayu）为大家所熟悉。"}, {"q": "以下哪个联邦直辖区是最晚成立的？", "opts": ["吉隆坡（1974年）", "纳闽（1984年）", "布城（Putrajaya，2001年）", "三者同时成立"], "ans": 2, "exp": "布城于2001年成为马来西亚第三个联邦直辖区，是最晚成立的；吉隆坡1974年，纳闽1984年。"}, {"q": "东姑阿都拉曼在宣布马来西亚成立大典上高呼几声默迪卡？", "opts": ["三声", "五声", "七声", "九声"], "ans": 2, "exp": "课文图片说明记载：东姑阿都拉曼在宣布马来西亚成立的大典上高呼七声默迪卡。"}, {"q": "伊班族女性在嘉华节穿什么传统服装？", "opts": ["纱丽", "马来套装", "纺织图案的彩布（pua kumbu）", "旗袍"], "ans": 2, "exp": "课文指出，在嘉华节或婚宴时，伊班族女性会穿上纺织图案的彩布（pua kumbu）。"}, {"q": "马来半岛北部与哪个国家接壤？", "opts": ["印度尼西亚", "新加坡", "泰国", "越南"], "ans": 2, "exp": "马来西亚半岛北部与泰国接壤，玻璃市和吉打是与泰国接壤的最北端州属。"}, {"q": "峇峇娘惹的传统服装是什么？", "opts": ["旗袍和长衫", "纱丽和陀地", "绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）", "马来套装和马来男装"], "ans": 2, "exp": "课文指出，峇峇娘惹的传统服装是绣花哥峇雅（kebaya bersulam）和峇迪沙笼（kain batik sarung）。"}, {"q": "以下哪个州的首府是新山（Johor Bahru）？", "opts": ["马六甲", "雪兰莪", "柔佛（Johor）", "森美兰"], "ans": 2, "exp": "柔佛州（Johor）首府是新山（Johor Bahru），与新加坡隔柔佛海峡相望，是马来西亚最南端的州。"}, {"q": "大马来由（Melayu Raya）主张合并的地区包括哪些？", "opts": ["只有马来半岛和新加坡", "马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛", "只有砂拉越和沙巴", "只有马来半岛与泰国"], "ans": 1, "exp": "课文指出，大马来由主张把马来半岛、新加坡、加里曼丹、菲律宾群岛与印度尼西亚群岛合并起来。"}, {"q": "马尔科姆麦克唐纳（Malcolm MacDonald）于1951年就合并事宜进行会谈时，他的职务是什么？", "opts": ["葛波委员会主席", "英国北婆罗洲公司董事", "英国驻东南亚高级总督", "马来亚联合邦副首相"], "ans": 2, "exp": "课文指出，1951年，英国驻东南亚高级总督马尔科姆麦克唐纳就合并一事与马来亚联合邦、砂拉越、沙巴和新加坡的领袖进行了多次会谈。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';

    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

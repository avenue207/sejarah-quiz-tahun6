<script>
const Q=[{"q": "独立前马来族主要居住在哪里，从事什么经济活动？", "opts": ["市镇，采矿", "园丘，橡胶种植", "乡村、沿海地带与河畔，农耕、捕鱼、小生意与公共服务", "内陆，狩猎"], "ans": 2, "exp": "课文指出，独立前，马来族住在乡村、沿海地带与河畔，从事农耕、捕鱼、小生意与公共服务。"}, {"q": "新加坡公投的结果是什么？", "opts": ["人民反对成立马来西亚", "结果各半", "人民支持成立马来西亚", "公投被取消"], "ans": 2, "exp": "新加坡举行的公投结果显示，新加坡人民支持成立马来西亚。"}, {"q": "1957年8月31日在马来西亚历史上代表什么？", "opts": ["马来西亚联邦成立", "马来亚联合邦宣告独立", "《马来西亚协定》签署", "葛波委员会成立"], "ans": 1, "exp": "1957年8月31日是马来亚联合邦宣告独立的日期，马来西亚联邦则于1963年9月16日才正式成立。"}, {"q": "国家原则的宗旨是什么？", "opts": ["增加国防开支", "培养团结且具包容态度的国民", "促进对外贸易", "提高国民生产总值"], "ans": 1, "exp": "课文指出，国家原则旨在培养团结且具包容态度的国民，是促进忠诚与爱国精神的指南。"}, {"q": "国家原则（Rukun Negara）颁布于哪一年哪一天？", "opts": ["1957年8月31日", "1963年9月16日", "1969年5月13日", "1970年8月31日"], "ans": 3, "exp": "国家原则于1970年8月31日，在马来西亚庆祝独立13周年纪念日时正式颁布。"}, {"q": "以下哪项情境体现了维护宪法？", "opts": ["骑自行车遵守交规", "主动扶老婆婆过马路", "参与国会下议院立法工作", "参加突击队训练"], "ans": 2, "exp": "课文举例（伊登）：参与国会下议院立法的工作，体现了维护宪法的精神。"}, {"q": "以下哪项是国家原则忠于君国中君所指的人物？", "opts": ["首相", "州苏丹", "最高元首（Yang di-Pertuan Agong）", "英国国王"], "ans": 2, "exp": "国家原则忠于君国中的君是指马来西亚最高元首（Yang di-Pertuan Agong），国是指马来西亚国家。"}, {"q": "锡克族男性传统服装有什么特征？", "opts": ["穿旗袍", "穿纱丽", "穿长至膝盖的上衣和裤子及缠头巾", "穿绣花哥峇雅"], "ans": 2, "exp": "课文指出，锡克族男性的服装是长至膝盖的上衣和裤子（tahmat/tamba）及缠头巾，头巾是锡克文化的重要象征。"}, {"q": "以下哪个州首府是怡保（Ipoh），历史上以锡矿著称？", "opts": ["彭亨", "雪兰莪", "霹雳", "丁加奴"], "ans": 2, "exp": "霹雳州（Perak）首府怡保（Ipoh），历史上是马来西亚最重要的锡矿产区，怡保曾有锡都之称。"}, {"q": "以下哪个州是马来西亚人口最多、工业最发达的州？", "opts": ["柔佛", "霹雳", "雪兰莪（Selangor）", "彭亨"], "ans": 2, "exp": "雪兰莪州（Selangor）是马来西亚人口最多、工业最发达的州，吉隆坡联邦直辖区由其分出。"}, {"q": "以下哪个族群是沙巴最大的族群？", "opts": ["伊班族", "巴瑶族", "卡达山杜顺族", "龙古斯族"], "ans": 2, "exp": "课文指出，卡达山杜顺族是沙巴最大的族群，其中的族群分支拥有自己的语言。"}, {"q": "课文关于多元族群的核心结论是什么？", "opts": ["各族文化需要被改变", "各族群互相包容且和睦共处是马来西亚的特色，学习各族特色能培养爱国精神", "只需了解本族群特色", "不同族群之间无需了解彼此"], "ans": 1, "exp": "课文结语：各族群互相包容且和睦共处是马来西亚的特色，我们学习和分享各族群特色能够培养爱国精神。"}, {"q": "国家原则第五项（培养德行）的马来文是？", "opts": ["Kepercayaan kepada Tuhan", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 3, "exp": "国家原则第五项培养德行的马来文是Kesopanan dan Kesusilaan。"}, {"q": "只合并新加坡与马来亚联合邦会导致什么问题？", "opts": ["经济发展失衡", "族群结构不平衡", "共产党威胁加剧", "基础设施不足"], "ans": 1, "exp": "课文指出，只合并新加坡与马来亚联合邦将导致族群结构不平衡；因此必须加入砂拉越和沙巴以平衡各族人口比例。"}, {"q": "制定国家原则的直接历史背景是什么？", "opts": ["马来西亚加入联合国", "1963年马来西亚成立", "1969年5月13日事件", "日本占领马来亚"], "ans": 2, "exp": "课文指出，1969年5月13日事件之后，国家行动理事会负责管制马来西亚，国家原则就是在那时制定的。"}, {"q": "葛波委员会（Suruhanjaya Cobbold）成立的日期是？", "opts": ["1961年7月23日", "1962年1月17日", "1962年6月21日", "1963年7月9日"], "ans": 1, "exp": "葛波委员会于1962年1月17日成立，目的是进行调查以收集砂拉越与沙巴的民意。"}, {"q": "槟城乔治市（George Town）的历史重要性是什么？", "opts": ["是马来西亚首都", "是英国在马来亚建立的第一个殖民地", "是马来西亚面积最大的州", "是马来西亚第一个宣告独立的州"], "ans": 1, "exp": "槟城（Penang）是英国在马来亚建立的第一个殖民地，弗朗西斯莱特于1786年占领槟城。"}, {"q": "有宗教信仰的社会能避免哪些问题？", "opts": ["交通堵塞", "嫉妒、背叛、贪污、滥用毒品和道德堕落", "农业问题", "经济通胀"], "ans": 1, "exp": "课文指出，有宗教信仰的社会能避免嫉妒、背叛、贪污、滥用毒品和道德堕落。"}, {"q": "沙巴的首府是哪个城市？", "opts": ["古晋", "诗巫", "美里", "亚庇（Kota Kinabalu）"], "ans": 3, "exp": "亚庇（Kota Kinabalu）是沙巴州的首府，以京那巴鲁山著称。"}, {"q": "以下哪个州以其独特的长屋（Rumah Panjang）文化著称，是伊班族的聚居地？", "opts": ["霹雳", "彭亨", "砂拉越（Sarawak）", "雪兰莪"], "ans": 2, "exp": "砂拉越的土著族群，尤其是伊班族，以传统的长屋（Rumah Panjang）文化著称，一栋长屋可容纳多户家庭共同居住。"}, {"q": "砂拉越沿海的马来族、马兰诺族和卡达央族独立前从事什么活动？", "opts": ["种植稻米", "采集森林资源", "经商、造船和生产硕莪", "捕鱼和农耕"], "ans": 2, "exp": "课文指出，住在沿海的马来族、马兰诺族和卡达央族，从事经商、造船和生产硕莪的工作。"}, {"q": "峇峇和娘惹是哪两个群体通婚的后代？", "opts": ["英国人与马来人", "来自中国的商人与马六甲当地女性", "印度商人与华族女性", "葡萄牙人与马来人"], "ans": 1, "exp": "课文指出，峇峇和娘惹是早期来自中国的商人和马六甲当地女性通婚的后代，男性称峇峇（Baba），女性称娘惹（Nyonya）。"}, {"q": "马来西亚成立时汶莱没有加入，最终马来西亚由几个地方组成？", "opts": ["三个", "四个", "五个", "六个"], "ans": 1, "exp": "马来西亚最终由马来亚联合邦、砂拉越、沙巴与新加坡四个地方组成（汶莱没有加入）。"}, {"q": "课文中青年反毒运动图片用来说明国家原则的哪项功能？", "opts": ["塑造有宗教信仰的社会", "塑造富有爱国精神的社会", "培养尊重法治的态度", "巩固社会团结"], "ans": 2, "exp": "课文在培养尊重法治的态度部分展示青年反毒运动图片，说明国家原则能引导人民远离犯罪活动。"}, {"q": "葛波委员会报告于哪一天移交？", "opts": ["1962年1月17日", "1962年6月21日", "1963年7月9日", "1963年8月12日"], "ans": 1, "exp": "葛波委员会于1962年6月21日将民意调查报告移交予英国殖民当局与马来亚联合邦。"}, {"q": "沙巴龙古斯族以什么著名？", "opts": ["造船", "种植稻米", "手工艺品", "采集海产"], "ans": 2, "exp": "课文指出，大部份龙古斯族住在内陆地区，龙古斯族以手工艺品闻名。"}, {"q": "彭亨州最著名的自然保护区是什么？", "opts": ["百乐公园", "塔曼尼加拉国家公园", "京那巴鲁国家公园", "珊瑚公园"], "ans": 1, "exp": "彭亨州拥有著名的塔曼尼加拉国家公园（Taman Negara），是全球最古老的热带雨林之一。"}, {"q": "暹罗族在新年庆祝什么节日？", "opts": ["开斋节", "农历新年", "屠妖节", "泼水节"], "ans": 3, "exp": "课文指出，暹罗族在新年庆祝泼水节，并在暹樾举行仪式时穿上传统服装。"}, {"q": "以下哪个州与印度尼西亚苏门答腊隔马六甲海峡相望？", "opts": ["柔佛", "雪兰莪", "马六甲", "霹雳"], "ans": 2, "exp": "马六甲州与印度尼西亚苏门答腊隔着马六甲海峡相望，马六甲海峡是世界最繁忙航运水道之一。"}, {"q": "以下哪个描述正确说明马来西亚州属的组成？", "opts": ["全部州在马来半岛", "13个州中11个在半岛，2个在婆罗洲", "全部州在婆罗洲", "只有5个州"], "ans": 1, "exp": "马来西亚13个州中，11个（西马）在马来半岛，2个（东马：沙巴和砂拉越）在婆罗洲岛北部。"}, {"q": "东姑阿都拉曼于1955年提出成立马来西亚时，他当时的职务是什么？", "opts": ["马来亚联合邦首相", "马来亚联合邦首席部长", "砂拉越首席部长", "新加坡总理"], "ans": 1, "exp": "课文指出，1955年马来亚联合邦首席部长东姑阿都拉曼提出联合的概念，他建议新加坡、砂拉越、沙巴和汶莱加入马来亚联合邦。"}, {"q": "跨政府委员会（JAK）由哪几方的代表组成？", "opts": ["只有马来亚联合邦代表", "英国、马来亚联合邦、砂拉越与沙巴代表", "联合国代表", "只有英国代表"], "ans": 1, "exp": "课文指出，跨政府委员会由英国、马来亚联合邦、砂拉越与沙巴代表组成，负责制定保障砂拉越与沙巴权益的宪法草案。"}];
let A=new Array(Q.length).fill(null),done=false;
function build(){
  const c=document.getElementById('qctr');c.innerHTML='';
  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>

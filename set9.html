<script>
const Q=[{"q": "伊班族男性在嘉华节穿什么传统服装？", "opts": ["旗袍", "陀地", "鸟裳（baju burung）和哥兰比（kelambi）", "马来男装"], "ans": 2, "exp": "课文指出，伊班族男性在嘉华节或婚宴时会穿上鸟裳（baju burung）和哥兰比（kelambi）。"}, {"q": "砂拉越面对什么威胁，使成立马来西亚有助于保障国家安全？", "opts": ["天灾", "经济危机", "共产主义威胁", "外国侵略"], "ans": 2, "exp": "课文指出，除了新加坡，砂拉越也面对共产主义的威胁，成立马来西亚能有效抵御这一威胁。"}, {"q": "锡克族的母语是什么？", "opts": ["淡米尔语", "泰卢固语", "旁遮普语（bahasa Punjabi）", "克里斯坦语"], "ans": 2, "exp": "课文明确指出，锡克族的母语是旁遮普语（bahasa Punjabi）。"}, {"q": "以下哪项情境体现了信奉上苍？", "opts": ["遵守交通规则", "参与国会立法", "一家人及邻居按各自的宗教信仰为病人祈祷", "参加突击队训练"], "ans": 2, "exp": "课文举例（吉塔）：一家人和邻居按各自的宗教信仰为她发高烧的父亲祈祷，体现了信奉上苍及族群包容。"}, {"q": "制定国家原则的三大原因中，以下哪项是经济因素？", "opts": ["居住地区的分化", "政治理念的不同", "经济地位的落差", "外国侵略威胁"], "ans": 2, "exp": "课文列出制定国家原则的三个原因：经济地位的落差（经济因素）、居住地区的分化（社会因素）、政治理念的不同（政治因素）。"}, {"q": "敦阿都拉萨在成立马来西亚进程中的职务是？", "opts": ["首席部长", "副首相兼跨政府委员会成员", "砂拉越首席部长", "外交部长"], "ans": 1, "exp": "敦阿都拉萨（Tun Abdul Razak Hussein）是马来亚联合邦副首相，也是跨政府委员会（JAK）成员，并代表马来亚联合邦在伦敦签署《马来西亚协定》。"}, {"q": "以下哪个联邦直辖区是最晚成立的？", "opts": ["吉隆坡（1974年）", "纳闽（1984年）", "布城（Putrajaya，2001年）", "三者同时成立"], "ans": 2, "exp": "布城于2001年成为马来西亚第三个联邦直辖区，是最晚成立的；吉隆坡1974年，纳闽1984年。"}, {"q": "成立马来西亚能加快哪些地方脱离殖民统治？", "opts": ["马来亚联合邦", "砂拉越、沙巴、新加坡与汶莱", "泰国", "印度尼西亚"], "ans": 1, "exp": "课文指出，成立马来西亚能加快砂拉越、沙巴、新加坡与汶莱脱离殖民统治，这个进程必须获得各方的协商与支持。"}, {"q": "峇峇娘惹使用什么语言沟通？", "opts": ["闽南语", "客家语", "峇峇语", "克里奥尔马来语"], "ans": 2, "exp": "课文指出，峇峇娘惹以峇峇语沟通，他们的生活方式、语言、风俗习惯和饮食文化与本地文化融合而成。"}, {"q": "成立马来西亚的四大原因中，以下哪项说明了教育和基础设施的提升？", "opts": ["保障国家安全", "平衡族群结构", "加快独立步伐", "促进各邦发展"], "ans": 3, "exp": "课文说明，促进各邦发展包括促进基础建设、社会与经济的发展，提升国民的生活水平。"}, {"q": "独立前华族主要居住在哪里，从事什么经济活动？", "opts": ["乡村，捕鱼", "市镇与城市，采矿与经商", "园丘，种植橡胶", "内陆，狩猎"], "ans": 1, "exp": "课文指出，独立前，华族住在市镇与城市，从事采矿与经商。"}, {"q": "国家原则培养了各族国民的哪三种精神？", "opts": ["竞争、进步、创新", "包容、合作与相互谅解的精神", "独立、自强、个人主义", "排外、保守、固步自封"], "ans": 1, "exp": "课文指出，国家原则培养了各族国民的包容、合作与相互谅解的精神，在塑造国民高尚情操方面至关重要。"}, {"q": "马六甲和槟城于哪一年被UNESCO列为世界文化遗产城市？", "opts": ["2000年", "2005年", "2008年", "2010年"], "ans": 2, "exp": "马六甲与槟城乔治市于2008年7月7日被联合国教科文组织列为世界文化遗产城市。"}, {"q": "成立马来西亚进程中，哪项步骤排在葛波委员会报告之后、《马来西亚协定》之前？", "opts": ["东姑访问砂拉越", "成立忠诚委员会JSKM", "成立跨政府委员会JAK及新加坡公投", "宣布马来西亚成立"], "ans": 2, "exp": "根据课文时间线，在葛波委员会报告之后，成立跨政府委员会（JAK）并举行新加坡公投（1962年），然后才签署《马来西亚协定》（1963年7月9日）。"}, {"q": "峇峇和娘惹是哪两个群体通婚的后代？", "opts": ["英国人与马来人", "来自中国的商人与马六甲当地女性", "印度商人与华族女性", "葡萄牙人与马来人"], "ans": 1, "exp": "课文指出，峇峇和娘惹是早期来自中国的商人和马六甲当地女性通婚的后代，男性称峇峇（Baba），女性称娘惹（Nyonya）。"}, {"q": "马来西亚最高峰京那巴鲁山位于哪个州？", "opts": ["砂拉越", "彭亨", "沙巴", "霹雳"], "ans": 2, "exp": "京那巴鲁山（Mount Kinabalu）海拔4,095米，位于沙巴州，是马来西亚最高峰。"}, {"q": "领会和实践国家原则对个人有什么益处？", "opts": ["获得更多财富", "使我们成为有礼和懂得相互谅解的人", "获得更高政治地位", "赢得国际认可"], "ans": 1, "exp": "课文温故知新总结：领会和实践国家原则，使我们成为有礼和懂得相互谅解的人。"}, {"q": "马来西亚的成立是指以下哪几个地方合并组成联邦国家？", "opts": ["马来亚联合邦、砂拉越、沙巴与新加坡", "马来亚联合邦、砂拉越与沙巴", "马来亚联合邦与新加坡", "马来亚联合邦、砂拉越、沙巴、新加坡与汶莱"], "ans": 0, "exp": "课文明确指出，马来西亚的成立是指马来亚联合邦、砂拉越、沙巴与新加坡组成一个联邦国家的历史事件。"}, {"q": "跨政府委员会（JAK）的马来文全称是什么？", "opts": ["Jawatankuasa Setia Kawan Malaysia", "Suruhanjaya Cobbold", "Jawatankuasa Antara Kerajaan", "Majlis Perundingan Negara"], "ans": 2, "exp": "跨政府委员会的马来文全称是Jawatankuasa Antara Kerajaan，缩写JAK。"}, {"q": "制定国家原则的三大原因中，以下哪项是社会因素？", "opts": ["经济地位的落差", "居住地区的分化", "政治理念的不同", "宗教信仰差异"], "ans": 1, "exp": "制定国家原则的社会因素是居住地区的分化，即各族群因历史经济原因聚居在不同地区。"}, {"q": "以下哪个州以其独特的长屋（Rumah Panjang）文化著称，是伊班族的聚居地？", "opts": ["霹雳", "彭亨", "砂拉越（Sarawak）", "雪兰莪"], "ans": 2, "exp": "砂拉越的土著族群，尤其是伊班族，以传统的长屋（Rumah Panjang）文化著称，一栋长屋可容纳多户家庭共同居住。"}, {"q": "JSKM于哪一天成立？", "opts": ["1961年5月27日", "1961年7月23日", "1962年1月17日", "1963年9月16日"], "ans": 1, "exp": "马来西亚忠诚委员会（JSKM）于1961年7月23日成立。"}, {"q": "马来西亚首都吉隆坡属于什么类型的行政区划？", "opts": ["普通州", "联邦直辖区", "自治区", "特别行政区"], "ans": 1, "exp": "吉隆坡是马来西亚联邦直辖区，直属联邦政府管辖，是马来西亚首都和最大城市。"}, {"q": "以下哪个族群是沙巴最大的族群？", "opts": ["伊班族", "巴瑶族", "卡达山杜顺族", "龙古斯族"], "ans": 2, "exp": "课文指出，卡达山杜顺族是沙巴最大的族群，其中的族群分支拥有自己的语言。"}, {"q": "国家原则第二项（忠于君国）的马来文是？", "opts": ["Kepercayaan kepada Tuhan", "Kesetiaan kepada Raja dan Negara", "Keluhuran Perlembagaan", "Kesopanan dan Kesusilaan"], "ans": 1, "exp": "国家原则第二项忠于君国的马来文是Kesetiaan kepada Raja dan Negara。"}, {"q": "以下哪个州被称为马来西亚米仓，是最重要的稻米产区？", "opts": ["霹雳", "彭亨", "吉打（Kedah）", "柔佛"], "ans": 2, "exp": "吉打州（Kedah）被称为马来西亚的米仓，是全国最重要的稻米产区，以优质大米著名。"}, {"q": "暹罗族分布在马来半岛的哪些州属？", "opts": ["霹雳、雪兰莪、柔佛、彭亨", "吉打、吉兰丹、玻璃市、槟城和霹雳", "沙巴、砂拉越、马六甲", "雪兰莪、吉隆坡、森美兰"], "ans": 1, "exp": "课文指出，暹罗族分布在吉打、吉兰丹、玻璃市、槟城和霹雳。"}, {"q": "通过国家原则，国人能谅解和尊重不同族群的宗教和文化，这体现了哪项功能？", "opts": ["培养尊重法治的态度", "巩固社会团结", "塑造有宗教信仰的社会", "贯彻道德价值观"], "ans": 1, "exp": "课文指出，通过国家原则，国人能谅解和尊重不同族群的宗教和文化，从而巩固社会团结。"}, {"q": "马来西亚国家行政中心布城（Putrajaya）隶属于哪个联邦直辖区？", "opts": ["吉隆坡", "雪兰莪", "布城（Putrajaya）本身就是联邦直辖区", "森美兰"], "ans": 2, "exp": "布城（Putrajaya）本身就是马来西亚三个联邦直辖区之一，于2001年独立成为联邦直辖区。"}, {"q": "制定国家原则的直接历史背景是什么？", "opts": ["马来西亚加入联合国", "1963年马来西亚成立", "1969年5月13日事件", "日本占领马来亚"], "ans": 2, "exp": "课文指出，1969年5月13日事件之后，国家行动理事会负责管制马来西亚，国家原则就是在那时制定的。"}, {"q": "以下哪两个州没有世袭苏丹，由最高元首委任州元首治理？", "opts": ["霹雳和彭亨", "马六甲和槟城", "柔佛和雪兰莪", "吉打和玻璃市"], "ans": 1, "exp": "马六甲和槟城是马来西亚13个州中没有世袭苏丹的州，由最高元首委任的州元首（Yang di-Pertua Negeri）治理。"}, {"q": "独立前马来半岛原住民主要居住在哪里，从事什么经济活动？", "opts": ["市镇，经商", "园丘，种植橡胶", "内陆地区（霹雳、雪兰莪、彭亨、吉兰丹和登嘉楼），手工艺、狩猎与采集森林资源", "沿海，捕鱼"], "ans": 2, "exp": "课文指出，独立前，马来半岛原住民住在内陆地区，从事手工艺、狩猎与采集森林资源的工作。"}];

  const L=['A','B','C','D'];
  Q.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qc';d.id='qc'+i;
    const opts=q.opts.map((o,j)=>'<button class="ob" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')" ><span class="ol">'+L[j]+'</span><span>'+o+'</span></button>').join('');
    d.innerHTML='<div class="qh"><div class="qn">'+(i+1)+'</div><div class="qt">'+q.q+'</div></div><div class="opts">'+opts+'</div><div class="exp" id="ex'+i+'"><strong>✓ 解析：</strong>'+q.exp+'</div>';
    c.appendChild(d);
  });
}
function pick(qi,oi){
  if(done)return;A[qi]=oi;
  for(let j=0;j<4;j++)document.getElementById('o'+qi+'_'+j).style.cssText='';
  document.getElementById('o'+qi+'_'+oi).style.cssText='border-color:#1a2744;background:#e8ecf8';
  upd();
}
function upd(){
  const n=A.filter(a=>a!==null).length;
  document.getElementById('pb').style.width=(n/Q.length*100)+'%';
  document.getElementById('pbl').textContent=n+' / '+Q.length+' 已作答';
}
function doSub(){
  const un=A.filter(a=>a===null).length;
  if(un>0){const w=document.getElementById('wn');w.style.display='block';w.textContent='⚠ 还有 '+un+' 道题未作答，请完成后再提交。';return;}
  done=true;document.getElementById('wn').style.display='none';document.getElementById('subBtn').disabled=true;
  let ok=0;
  Q.forEach((q,i)=>{
    const ua=A[i],ra=q.ans,good=(ua===ra);if(good)ok++;
    for(let j=0;j<4;j++){const b=document.getElementById('o'+i+'_'+j);b.style.cssText='';b.disabled=true;
      if(j===ra&&good&&j===ua)b.classList.add('correct');
      else if(j===ua&&!good)b.classList.add('wrong');
      else if(j===ra&&!good)b.classList.add('reveal');
    }
    if(!good)document.getElementById('ex'+i).classList.add('show');
  });
  const sc=Math.round(ok/Q.length*100);
  document.getElementById('scn').textContent=sc;
  document.getElementById('cc').textContent=ok;
  document.getElementById('wc').textContent=Q.length-ok;
  let t,s;
  if(sc>=90){t='🏆 非常出色！';s='羽绚，你的历史知识非常扎实，满分指日可待！继续努力！';}
  else if(sc>=75){t='🌟 做得很好！';s='羽绚，成绩优异！认真复习错题解析，下次会更棒！';}
  else if(sc>=60){t='👍 继续加油！';s='羽绚，基础不错！仔细阅读每道错题的解析，进步会更快！';}
  else{t='📖 再加把劲！';s='羽绚，不要气馁！认真读懂解析，再来一次，一定进步！';}
  document.getElementById('rtl').textContent=t;
  document.getElementById('rsb').textContent=s;
  document.getElementById('rp').classList.add('show');
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function doReset(){
  A=new Array(Q.length).fill(null);done=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('wn').style.display='none';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
}
build();upd();
</script>
</body></html>
